apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zitadel
spec:
  replicas: 3
  template:
    metadata:
      labels:
        policy.prplanit.com/ingress: "true"
        policy.prplanit.com/client-postgres: "true"
        policy.prplanit.com/access-scope-postgres: zeldas-lullaby.zitadel.postgres
        policy.prplanit.com/client-redis: "true"
        policy.prplanit.com/access-scope-redis: zeldas-lullaby.zitadel.redis
