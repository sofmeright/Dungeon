apiVersion: v1
kind: ConfigMap
metadata:
  name: harbor-proxy-cache-nginx
data:
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {
      access_log /dev/stdout;
      resolver kube-dns.kube-system.svc.cluster.local valid=10s;

      # Map subdomain to Harbor proxy cache project name
      map $host $proxy_cache_project {
        docker.cr.pcfae.com  docker-cache;
        ghcr.cr.pcfae.com    ghcr-cache;
        quay.cr.pcfae.com    quay-cache;
        lscr.cr.pcfae.com    lscr-cache;
        default              "";
      }

      server {
        listen 8080;
        server_name docker.cr.pcfae.com ghcr.cr.pcfae.com quay.cr.pcfae.com lscr.cr.pcfae.com;

        set $harbor_upstream http://harbor.hyrule-castle.svc.cluster.local;

        # Registry v2 ping — passthrough, no rewrite.
        # Fix www-authenticate realm to use proxy-cache subdomain.
        location = /v2/ {
          proxy_pass $harbor_upstream;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto https;

          header_filter_by_lua_block {
            local www_auth = ngx.header["Www-Authenticate"]
            if www_auth then
              www_auth = www_auth:gsub(
                'realm="https://cr%.pcfae%.com/',
                'realm="https://' .. ngx.var.host .. '/'
              )
              ngx.header["Www-Authenticate"] = www_auth
            end
          }
        }

        # Token service — inject project prefix into scope.
        location /service/token {
          set $modified_args $args;

          rewrite_by_lua_block {
            local args = ngx.var.args
            if args then
              local project = ngx.var.proxy_cache_project
              if project and project ~= "" then
                -- Inject project prefix and library/ for official images.
                -- Official images have no slash in the name (e.g. "docker", "alpine").
                -- Namespaced images have a slash (e.g. "prplanit/stagefreight").
                --
                -- Plain format:   scope=repository:<image>:<action>
                -- Encoded format: scope=repository%3A<image>%3A<action>

                local function inject_prefix(s, sep_colon, sep_slash)
                  local pat = "scope=repository" .. sep_colon
                  local prefix = project .. sep_slash
                  -- Skip if already prefixed
                  if s:find(pat .. prefix, 1, true) then return s end
                  -- Check if image name is single-component (no slash)
                  -- e.g. scope=repository:docker:pull → needs library/
                  -- e.g. scope=repository:prplanit/stagefreight:pull → no library/
                  local img = s:match(pat .. "([^&]+)")
                  if img then
                    -- Count slashes/encoded-slashes in the image+action part
                    local has_ns = img:find(sep_slash, 1, true)
                    if has_ns then
                      -- Namespaced image, just add project prefix
                      s = s:gsub(pat, pat .. prefix, 1)
                    else
                      -- Official image, add project + library/
                      s = s:gsub(pat, pat .. prefix .. "library" .. sep_slash, 1)
                    end
                  end
                  return s
                end

                if args:find("scope=repository%%3A") then
                  args = inject_prefix(args, "%%3A", "%%2F")
                  ngx.req.set_uri_args(args)
                elseif args:find("scope=repository:") then
                  args = inject_prefix(args, ":", "/")
                  ngx.req.set_uri_args(args)
                end
              end
            end
          }

          proxy_pass $harbor_upstream;
          proxy_set_header Host cr.pcfae.com;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto https;
        }

        # Catalog — passthrough for debugging/tooling.
        location = /v2/_catalog {
          proxy_pass $harbor_upstream;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto https;
        }

        # Registry API — rewrite /v2/<path> to /v2/<project>/<path>.
        # Inject library/ prefix for official Docker Hub images (single-name).
        # Fix www-authenticate realm on 401 responses.
        location /v2/ {
          rewrite_by_lua_block {
            local uri = ngx.var.uri
            local project = ngx.var.proxy_cache_project
            if project and project ~= "" then
              -- Match /v2/<image>/<action> where <image> has no slash
              -- e.g. /v2/docker/manifests/... → /v2/docker-cache/library/docker/manifests/...
              -- vs   /v2/prplanit/stagefreight/manifests/... → /v2/docker-cache/prplanit/stagefreight/manifests/...
              local image, rest = uri:match("^/v2/([^/]+)/(manifests/.+)$")
              if not image then
                image, rest = uri:match("^/v2/([^/]+)/(blobs/.+)$")
              end
              if image and rest then
                -- Single-name image (no slash) = official, needs library/ prefix
                ngx.req.set_uri("/v2/" .. project .. "/library/" .. image .. "/" .. rest)
              else
                -- Multi-component path, just prepend project
                local path = uri:match("^/v2/(.+)$")
                if path then
                  ngx.req.set_uri("/v2/" .. project .. "/" .. path)
                end
              end
            end
          }

          proxy_pass $harbor_upstream;
          proxy_set_header Host cr.pcfae.com;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto https;

          header_filter_by_lua_block {
            local www_auth = ngx.header["Www-Authenticate"]
            if www_auth then
              www_auth = www_auth:gsub(
                'realm="https://cr%.pcfae%.com/',
                'realm="https://' .. ngx.var.host .. '/'
              )
              ngx.header["Www-Authenticate"] = www_auth
            end
          }
        }
      }
    }
