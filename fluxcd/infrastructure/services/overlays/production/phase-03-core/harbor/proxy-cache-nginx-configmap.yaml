apiVersion: v1
kind: ConfigMap
metadata:
  name: harbor-proxy-cache-nginx
data:
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {
      access_log /dev/stdout;
      resolver kube-dns.kube-system.svc.cluster.local valid=10s;

      # Map subdomain to Harbor proxy cache project name
      map $host $proxy_cache_project {
        docker.cr.pcfae.com  docker-cache;
        ghcr.cr.pcfae.com    ghcr-cache;
        quay.cr.pcfae.com    quay-cache;
        lscr.cr.pcfae.com    lscr-cache;
        default              "";
      }

      server {
        listen 8080;
        server_name docker.cr.pcfae.com ghcr.cr.pcfae.com quay.cr.pcfae.com lscr.cr.pcfae.com;

        set $harbor_upstream http://harbor.hyrule-castle.svc.cluster.local;

        # Registry v2 ping — passthrough, no rewrite.
        # Fix www-authenticate realm to use proxy-cache subdomain.
        location = /v2/ {
          proxy_pass $harbor_upstream;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto https;

          header_filter_by_lua_block {
            local www_auth = ngx.header["Www-Authenticate"]
            if www_auth then
              www_auth = www_auth:gsub(
                'realm="https://cr%.pcfae%.com/',
                'realm="https://' .. ngx.var.host .. '/'
              )
              ngx.header["Www-Authenticate"] = www_auth
            end
          }
        }

        # Token service — inject project prefix into scope.
        location /service/token {
          set $modified_args $args;

          rewrite_by_lua_block {
            local args = ngx.var.args
            if args then
              local project = ngx.var.proxy_cache_project
              if project and project ~= "" then
                -- Handle both plain and URL-encoded scope formats:
                --   scope=repository:X:action  (curl)
                --   scope=repository%3AX%3Aaction  (CRI-O, Docker)
                local prefixed_plain = "scope=repository:" .. project .. "/"
                local prefixed_encoded = "scope=repository%%3A" .. project .. "%%2F"
                if args:find("scope=repository%%3A") then
                  -- URL-encoded format
                  if not args:find(prefixed_encoded, 1, true) then
                    args = args:gsub("scope=repository%%3A", "scope=repository%%3A" .. project .. "%%2F")
                    ngx.req.set_uri_args(args)
                  end
                elseif args:find("scope=repository:") then
                  -- Plain format
                  if not args:find(prefixed_plain, 1, true) then
                    args = args:gsub("scope=repository:", "scope=repository:" .. project .. "/")
                    ngx.req.set_uri_args(args)
                  end
                end
              end
            end
          }

          proxy_pass $harbor_upstream;
          proxy_set_header Host cr.pcfae.com;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto https;
        }

        # Catalog — passthrough for debugging/tooling.
        location = /v2/_catalog {
          proxy_pass $harbor_upstream;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto https;
        }

        # Registry API — rewrite /v2/<path> to /v2/<project>/<path>.
        # Fix www-authenticate realm on 401 responses.
        location /v2/ {
          rewrite ^/v2/(.*)$ /v2/$proxy_cache_project/$1 break;

          proxy_pass $harbor_upstream;
          proxy_set_header Host cr.pcfae.com;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto https;

          header_filter_by_lua_block {
            local www_auth = ngx.header["Www-Authenticate"]
            if www_auth then
              www_auth = www_auth:gsub(
                'realm="https://cr%.pcfae%.com/',
                'realm="https://' .. ngx.var.host .. '/'
              )
              ngx.header["Www-Authenticate"] = www_auth
            end
          }
        }
      }
    }
