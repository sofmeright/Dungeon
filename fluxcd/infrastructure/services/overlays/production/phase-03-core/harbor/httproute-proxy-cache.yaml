---
# Docker Hub proxy cache — all routing handled by nginx proxy
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harbor-proxy-cache-docker
spec:
  parentRefs:
    - name: xylem-gateway
      namespace: arylls-lookout
  hostnames:
    - "docker.cr.pcfae.com"
  rules:
    - backendRefs:
        - name: harbor-proxy-cache-proxy
          port: 8080
---
