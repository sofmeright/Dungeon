---
# Docker Hub proxy cache routes
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harbor-proxy-cache-docker
spec:
  parentRefs:
    - name: xylem-gateway
      namespace: arylls-lookout
  hostnames:
    - "docker.cr.pcfae.com"
  rules:
    # Rule 1: Token auth passthrough (must match before /v2/ rewrite)
    - matches:
        - path:
            type: PathPrefix
            value: /service/
      backendRefs:
        - name: harbor
          port: 80
    # Rule 2: Catalog passthrough for debugging/tooling
    - matches:
        - path:
            type: Exact
            value: /v2/_catalog
      backendRefs:
        - name: harbor
          port: 80
    # Rule 3: Registry API — rewrite /v2/ to /v2/docker-cache/
    - matches:
        - path:
            type: PathPrefix
            value: /v2/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /v2/docker-cache/
      backendRefs:
        - name: harbor
          port: 80
