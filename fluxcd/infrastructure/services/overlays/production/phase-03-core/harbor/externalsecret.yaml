apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: harbor-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-zeldas-letter
    kind: ClusterSecretStore
  target:
    name: harbor-secrets
    creationPolicy: Owner
  data:
    - secretKey: postgres_password
      remoteRef:
        key: apps/harbor
        property: POSTGRES_PASSWORD
    - secretKey: s3_accesskey
      remoteRef:
        key: apps/harbor
        property: S3_ACCESS_KEY
    - secretKey: s3_secretkey
      remoteRef:
        key: apps/harbor
        property: S3_SECRET_KEY
    - secretKey: admin_password
      remoteRef:
        key: apps/harbor
        property: ADMIN_PASSWORD
