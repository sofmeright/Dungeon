apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: harbor-postgres
spec:
  inheritedMetadata:
    labels:
      policy.prplanit.com/cnpg: "managed"
      policy.prplanit.com/access-class: postgres
      policy.prplanit.com/service-scope: hyrule-castle.harbor.postgres

  instances: 3

  bootstrap:
    initdb:
      database: registry
      owner: harbor
      secret:
        name: harbor-postgres-credentials
      postInitApplicationSQL:
        - CREATE DATABASE notaryserver OWNER harbor;
        - CREATE DATABASE notarysigner OWNER harbor;

  storage:
    storageClass: ceph-rbd-retain
    size: 20Gi
