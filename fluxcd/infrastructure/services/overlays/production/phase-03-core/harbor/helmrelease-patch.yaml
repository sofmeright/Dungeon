apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
spec:
  targetNamespace: hyrule-castle
  install:
    timeout: 15m
  valuesFrom:
    - kind: Secret
      name: harbor-secrets
      valuesKey: postgres_password
      targetPath: database.external.password
    - kind: Secret
      name: harbor-secrets
      valuesKey: s3_accesskey
      targetPath: persistence.imageChartStorage.s3.accesskey
    - kind: Secret
      name: harbor-secrets
      valuesKey: s3_secretkey
      targetPath: persistence.imageChartStorage.s3.secretkey
  postRenderers:
    - kustomize:
        patches:
          # Inject S3 CA trust bundle into core
          - target:
              kind: Deployment
              name: harbor-core
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: harbor-core
              spec:
                template:
                  spec:
                    volumes:
                      - name: s3-ca
                        configMap:
                          name: platform-trust-bundle
                    containers:
                      - name: core
                        volumeMounts:
                          - name: s3-ca
                            mountPath: /etc/ssl/certs/s3-ca.crt
                            subPath: ca.crt
                            readOnly: true
                        env:
                          - name: AWS_CA_BUNDLE
                            value: /etc/ssl/certs/s3-ca.crt
          # Inject S3 CA trust bundle into jobservice
          - target:
              kind: Deployment
              name: harbor-jobservice
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: harbor-jobservice
              spec:
                template:
                  spec:
                    volumes:
                      - name: s3-ca
                        configMap:
                          name: platform-trust-bundle
                    containers:
                      - name: jobservice
                        volumeMounts:
                          - name: s3-ca
                            mountPath: /etc/ssl/certs/s3-ca.crt
                            subPath: ca.crt
                            readOnly: true
                        env:
                          - name: AWS_CA_BUNDLE
                            value: /etc/ssl/certs/s3-ca.crt
          # Inject S3 CA trust bundle into registry
          - target:
              kind: Deployment
              name: harbor-registry
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: harbor-registry
              spec:
                template:
                  spec:
                    volumes:
                      - name: s3-ca
                        configMap:
                          name: platform-trust-bundle
                    containers:
                      - name: registry
                        volumeMounts:
                          - name: s3-ca
                            mountPath: /etc/ssl/certs/s3-ca.crt
                            subPath: ca.crt
                            readOnly: true
                        env:
                          - name: AWS_CA_BUNDLE
                            value: /etc/ssl/certs/s3-ca.crt
  values:
    # External URL
    externalURL: https://cr.pcfae.com

    # Harbor components - 3 replicas for HA with fully qualified images
    portal:
      replicas: 3
      image:
        repository: docker.io/goharbor/harbor-portal

    core:
      replicas: 3
      podLabels:
        policy.prplanit.com/cap.postgres: "true"
        policy.prplanit.com/access-scope-postgres: hyrule-castle.harbor.postgres
        policy.prplanit.com/cap.redis: "true"
        policy.prplanit.com/access-scope-redis: hyrule-castle.harbor.redis
        policy.prplanit.com/cap.s3: "true"
        policy.prplanit.com/access-scope-s3: gorons-bracelet.rgw
      image:
        repository: docker.io/goharbor/harbor-core

    jobservice:
      replicas: 3
      podLabels:
        policy.prplanit.com/cap.redis: "true"
        policy.prplanit.com/access-scope-redis: hyrule-castle.harbor.redis
        policy.prplanit.com/cap.s3: "true"
        policy.prplanit.com/access-scope-s3: gorons-bracelet.rgw
      image:
        repository: docker.io/goharbor/harbor-jobservice

    registry:
      replicas: 3
      podLabels:
        policy.prplanit.com/cap.s3: "true"
        policy.prplanit.com/access-scope-s3: gorons-bracelet.rgw
      registry:
        image:
          repository: docker.io/goharbor/registry-photon
      controller:
        image:
          repository: docker.io/goharbor/harbor-registryctl

    # Expose via ClusterIP - TLS terminated at xylem gateway
    expose:
      type: clusterIP
      tls:
        enabled: false

    nginx:
      podLabels:
        policy.prplanit.com/ingress: "true"
      image:
        repository: docker.io/goharbor/nginx-photon

    # External PostgreSQL via CloudNativePG
    database:
      type: external
      external:
        host: harbor-postgres-rw
        port: 5432
        username: harbor
        password: ""  # Injected by valuesFrom
        coreDatabase: registry
        notaryServerDatabase: notaryserver
        notarySignerDatabase: notarysigner

    # External Redis (our 3-replica StatefulSet)
    redis:
      type: external
      external:
        addr: harbor-redis-0.harbor-redis.hyrule-castle.svc.cluster.local:6379

    # Storage configuration - Ceph RGW (S3 compatible)
    persistence:
      enabled: true
      persistentVolumeClaim:
        registry:
          storageClass: ceph-rbd-retain
          size: 50Gi
        jobservice:
          jobLog:
            # Use CephFS (RWX) for multi-replica jobservice
            existingClaim: hyrule-castle-harbor-jobservice
            storageClass: ""
            size: ""
      imageChartStorage:
        type: s3
        s3:
          region: us-east-1
          bucket: harbor
          regionendpoint: https://ceph-rgw-gateway.gorons-bracelet.svc.cluster.local

    # Admin password from existing secret
    existingSecretAdminPassword: harbor-secrets
    existingSecretAdminPasswordKey: admin_password

    # Disable Trivy and Notary for now
    trivy:
      enabled: false

    notary:
      enabled: false
