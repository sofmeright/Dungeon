apiVersion: apps/v1
kind: Deployment
metadata:
  name: ceph-rgw-gateway
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: nginx
          image: docker.io/nginx:1.27-alpine
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
