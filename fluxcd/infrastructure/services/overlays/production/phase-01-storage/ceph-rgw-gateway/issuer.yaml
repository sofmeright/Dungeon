---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: ceph-rgw-gateway-selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ceph-rgw-gateway-ca
spec:
  isCA: true
  commonName: ceph-rgw-gateway-ca
  secretName: ceph-rgw-gateway-ca-key
  duration: 87600h  # 10 years
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: ceph-rgw-gateway-selfsigned
    kind: Issuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: ceph-rgw-gateway-ca-issuer
spec:
  ca:
    secretName: ceph-rgw-gateway-ca-key
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ceph-rgw-gateway-tls
spec:
  secretName: ceph-rgw-gateway-tls
  duration: 8760h  # 1 year
  renewBefore: 720h  # 30 days
  privateKey:
    algorithm: ECDSA
    size: 256
  dnsNames:
    - ceph-rgw-gateway
    - ceph-rgw-gateway.gorons-bracelet
    - ceph-rgw-gateway.gorons-bracelet.svc
    - ceph-rgw-gateway.gorons-bracelet.svc.cluster.local
  issuerRef:
    name: ceph-rgw-gateway-ca-issuer
    kind: Issuer
    group: cert-manager.io
