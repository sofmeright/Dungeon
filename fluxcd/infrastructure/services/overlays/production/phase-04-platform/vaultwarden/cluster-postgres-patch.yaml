apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: vaultwarden-postgres
spec:
  inheritedMetadata:
    labels:
      policy.prplanit.com/cnpg: "managed"
      policy.prplanit.com/access-class: postgres
      policy.prplanit.com/service-scope: zeldas-lullaby.vaultwarden.postgres

  imageName: ghcr.io/cloudnative-pg/postgresql:16

  storage:
    storageClass: ceph-rbd
    size: 10Gi
