---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: teleport-sessions-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  claimRef:
    apiVersion: v1
    kind: PersistentVolumeClaim
    name: teleport-sessions
    namespace: zeldas-lullaby
  csi:
    driver: gorons-bracelet.cephfs.csi.ceph.com
    nodeStageSecretRef:
      name: csi-cephfs-node
      namespace: gorons-bracelet
    volumeAttributes:
      clusterID: 0985467c-d8f3-4483-b27f-f0a512397ec2
      fsName: Seed_Bank
      staticVolume: "true"
      rootPath: /dungeon/hdd/apps/teleport/sessions
    volumeHandle: teleport-sessions-static
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: teleport-sessions
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  volumeName: teleport-sessions-pv
  storageClassName: ""
