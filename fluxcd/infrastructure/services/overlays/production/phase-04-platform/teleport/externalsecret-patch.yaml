apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: teleport-postgres-credentials
spec:
  secretStoreRef:
    name: vault-zeldas-letter
  data:
    - secretKey: username
      remoteRef:
        key: apps/teleport
        property: POSTGRES_USER
    - secretKey: password
      remoteRef:
        key: apps/teleport
        property: POSTGRES_PASSWORD
