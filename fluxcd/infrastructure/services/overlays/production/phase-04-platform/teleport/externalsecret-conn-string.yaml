apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: teleport-conn-string
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-zeldas-letter
    kind: ClusterSecretStore
  target:
    name: teleport-conn-string
    creationPolicy: Owner
    template:
      data:
        conn_string: "postgresql://teleport:{{ .password }}@teleport-postgres-rw.zeldas-lullaby.svc.cluster.local:5432/teleport_backend?sslmode=require"
        audit_events_uri: "postgresql://teleport:{{ .password }}@teleport-postgres-rw.zeldas-lullaby.svc.cluster.local:5432/teleport_audit?sslmode=require#retention_period=720h"
  data:
    - secretKey: password
      remoteRef:
        key: apps/teleport
        property: POSTGRES_PASSWORD
