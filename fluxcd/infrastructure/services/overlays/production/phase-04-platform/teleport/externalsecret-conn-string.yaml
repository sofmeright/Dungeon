apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: teleport-conn-string
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-zeldas-letter
    kind: ClusterSecretStore
  target:
    name: teleport-conn-string
    creationPolicy: Owner
    template:
      data:
        conn_string: "postgres://teleport:{{ .password }}@teleport-postgres-rw:5432/teleport?sslmode=require"
  data:
    - secretKey: password
      remoteRef:
        key: apps/teleport
        property: POSTGRES_PASSWORD
