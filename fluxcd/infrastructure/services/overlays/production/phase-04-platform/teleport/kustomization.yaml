apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../base/teleport
  - externalsecret-conn-string.yaml

patches:
  - path: helmrelease-patch.yaml
    target:
      kind: HelmRelease
      name: teleport
  - path: postgres-cluster-patch.yaml
    target:
      kind: Cluster
      name: teleport-postgres
  - path: externalsecret-patch.yaml
    target:
      kind: ExternalSecret
      name: teleport-postgres-credentials

  # HelmRelease and HelmRepository live in flux-system
  - target:
      kind: HelmRelease
      name: teleport
    patch: |-
      - op: add
        path: /metadata/namespace
        value: flux-system
  - target:
      kind: HelmRepository
      name: teleport
    patch: |-
      - op: add
        path: /metadata/namespace
        value: flux-system

  # All other resources live in zeldas-lullaby
  - target:
      kind: Cluster
      name: teleport-postgres
    patch: |-
      - op: add
        path: /metadata/namespace
        value: zeldas-lullaby
  - target:
      kind: ExternalSecret
      name: teleport-postgres-credentials
    patch: |-
      - op: add
        path: /metadata/namespace
        value: zeldas-lullaby
  - target:
      kind: ExternalSecret
      name: teleport-conn-string
    patch: |-
      - op: add
        path: /metadata/namespace
        value: zeldas-lullaby
