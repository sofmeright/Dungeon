apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: teleport
spec:
  targetNamespace: zeldas-lullaby
  valuesFrom:
    - kind: Secret
      name: teleport-conn-string
      valuesKey: conn_string
      targetPath: auth.teleportConfig.teleport.storage.conn_string
    - kind: Secret
      name: teleport-conn-string
      valuesKey: audit_events_uri
      targetPath: auth.teleportConfig.teleport.storage.audit_events_uri[0]
  values:
    clusterName: tsh.prplanit.com
    proxy:
      publicAddr: tsh.prplanit.com:443
    highAvailability:
      replicaCount: 2
      certManager:
        issuerName: letsencrypt-production
    service:
      annotations:
        lbipam.cilium.io/ips: "172.22.30.88"
        lbipam.cilium.io/sharing-key: "farores-wind"
        lbipam.cilium.io/sharing-cross-namespace: "*"
        service.cilium.io/loadbalancer-mode: "dsr"
