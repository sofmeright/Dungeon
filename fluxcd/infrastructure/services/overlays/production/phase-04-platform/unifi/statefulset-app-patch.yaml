apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: unifi-app
spec:
  replicas: 1
  template:
    metadata:
      labels:
        policy.prplanit.com/ingress: "true"
    spec:
      initContainers:
        - name: import-cert
          image: docker.io/alpine/k8s:1.34.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              apk add --no-cache openssl openjdk17-jre-headless >/dev/null 2>&1
              KEYSTORE="/config/data/keystore"
              STOREPASS="aircontrolenterprise"
              mkdir -p /config/data
              openssl pkcs12 -export \
                -in /tls/tls.crt -inkey /tls/tls.key \
                -out /tmp/unifi.p12 -name unifi \
                -passout pass:${STOREPASS}
              keytool -delete -alias unifi \
                -keystore ${KEYSTORE} \
                -storepass ${STOREPASS} -noprompt 2>/dev/null || true
              keytool -importkeystore \
                -srckeystore /tmp/unifi.p12 -srcstoretype PKCS12 \
                -srcstorepass ${STOREPASS} \
                -destkeystore ${KEYSTORE} -deststoretype pkcs12 \
                -deststorepass ${STOREPASS} -destkeypass ${STOREPASS} \
                -alias unifi -trustcacerts -noprompt
              rm -f /tmp/unifi.p12
              echo "Certificate imported into UniFi keystore"
          volumeMounts:
            - name: zeldas-lullaby-unifi-config
              mountPath: /config
            - name: tls-cert
              mountPath: /tls
              readOnly: true
      containers:
        - name: unifi-app
          image: docker.io/linuxserver/unifi-network-application:9.5.21
          env:
            - name: TZ
              value: "America/Los_Angeles"
          volumeMounts:
            - name: tls-cert
              mountPath: /tls
              readOnly: true
          securityContext:
            capabilities:
              drop:
                - ALL
              add:
                - SETUID
                - SETGID
                - CHOWN
                - DAC_OVERRIDE
                - FOWNER
      volumes:
        - name: tls-cert
          secret:
            secretName: unifi-pcfae-com-tls
  volumeClaimTemplates:
    - metadata:
        name: zeldas-lullaby-unifi-config
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ceph-rbd-retain
        resources:
          requests:
            storage: 256Mi
