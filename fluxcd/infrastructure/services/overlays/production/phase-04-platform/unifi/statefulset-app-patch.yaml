apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: unifi-app
spec:
  replicas: 1
  template:
    metadata:
      labels:
        policy.prplanit.com/ingress: "true"
      annotations:
        istio.io/dataplane-mode: none
    spec:
      containers:
        - name: unifi-app
          image: docker.io/linuxserver/unifi-network-application:9.5.21
          env:
            - name: TZ
              value: "America/Los_Angeles"
          securityContext:
            capabilities:
              drop:
                - ALL
              add:
                - SETUID
                - SETGID
                - CHOWN
                - DAC_OVERRIDE
                - FOWNER
  volumeClaimTemplates:
    - metadata:
        name: zeldas-lullaby-unifi-config
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ceph-rbd-retain
        resources:
          requests:
            storage: 256Mi
