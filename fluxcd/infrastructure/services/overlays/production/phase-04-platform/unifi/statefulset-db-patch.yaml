apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: unifi-db
spec:
  replicas: 1
  template:
    spec:
      imagePullSecrets:
        - name: jcr-pcfae-dungeon-pull-secret
      containers:
        - name: mongo
          image: docker.io/library/mongo:7.0.30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - SETUID
                - SETGID
                - CHOWN
                - DAC_OVERRIDE
  volumeClaimTemplates:
    - metadata:
        name: zeldas-lullaby-unifi-mongodb
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ceph-rbd-retain
        resources:
          requests:
            storage: 1Gi
