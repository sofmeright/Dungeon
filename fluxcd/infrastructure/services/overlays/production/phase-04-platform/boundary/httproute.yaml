apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: boundary
  annotations:
    gatus.home-operations.com/endpoint: |
      group: "Remote Access (Hookshot)"
spec:
  parentRefs:
    - name: cell-membrane-gateway
      namespace: hyrule-castle
      sectionName: https-prplanit
  hostnames:
    - "boundary.prplanit.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: boundary-controller
          port: 9200
