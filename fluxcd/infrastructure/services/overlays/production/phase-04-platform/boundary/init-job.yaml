# One-shot job — NOT in kustomization resources.
# Apply manually after Flux reconcile:
#   kubectl -n hookshot apply -f init-job.yaml
#   kubectl -n hookshot logs -f job/boundary-init
# Save output (contains initial auth method, login, password, token).
# Delete after success: kubectl -n hookshot delete job boundary-init
apiVersion: batch/v1
kind: Job
metadata:
  name: boundary-init
  namespace: hookshot
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: render-config
          image: docker.io/alpine/k8s:1.34.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              sed \
                -e "s|\${KMS_ROOT_KEY}|$KMS_ROOT_KEY|g" \
                -e "s|\${KMS_WORKER_AUTH_KEY}|$KMS_WORKER_AUTH_KEY|g" \
                -e "s|\${KMS_RECOVERY_KEY}|$KMS_RECOVERY_KEY|g" \
                /boundary-template/controller.hcl > /boundary/controller.hcl
          envFrom:
            - secretRef:
                name: boundary-kms-keys
          volumeMounts:
            - name: template
              mountPath: /boundary-template
            - name: config
              mountPath: /boundary
      containers:
        - name: boundary-init
          image: docker.io/hashicorp/boundary:0.21.1
          command: ["boundary", "database", "init", "-config", "/boundary/controller.hcl"]
          envFrom:
            - secretRef:
                name: boundary-conn-string
          volumeMounts:
            - name: config
              mountPath: /boundary
      volumes:
        - name: template
          configMap:
            name: boundary-controller
        - name: config
          emptyDir: {}
