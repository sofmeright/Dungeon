apiVersion: apps/v1
kind: Deployment
metadata:
  name: ceph-rgw-gateway
spec:
  replicas: PLACEHOLDER_REPLICAS
  selector:
    matchLabels:
      app: ceph-rgw-gateway
  template:
    metadata:
      labels:
        app: ceph-rgw-gateway
        policy.prplanit.com/probe: "true"
        policy.prplanit.com/cap.s3: "true"
        policy.prplanit.com/access-scope-s3: "gorons-bracelet.rgw"
    spec:
      containers:
        - name: nginx
          image: docker.io/nginx:PLACEHOLDER_TAG
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          resources:
            requests:
              memory: PLACEHOLDER_MEMORY_REQUEST
              cpu: PLACEHOLDER_CPU_REQUEST
            limits:
              memory: PLACEHOLDER_MEMORY_LIMIT
              cpu: PLACEHOLDER_CPU_LIMIT
      volumes:
        - name: nginx-config
          configMap:
            name: ceph-rgw-gateway-config
