apiVersion: v1
kind: Service
metadata:
  name: boundary-controller
  labels:
    app.kubernetes.io/name: boundary
    app.kubernetes.io/component: controller
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: boundary
    app.kubernetes.io/component: controller
  ports:
    - name: api
      port: 9200
      targetPort: api
      protocol: TCP
    - name: cluster
      port: 9201
      targetPort: cluster
      protocol: TCP
