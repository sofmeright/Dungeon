apiVersion: apps/v1
kind: Deployment
metadata:
  name: boundary-worker
  labels:
    app.kubernetes.io/name: boundary
    app.kubernetes.io/component: worker
spec:
  replicas: PLACEHOLDER_REPLICAS
  selector:
    matchLabels:
      app.kubernetes.io/name: boundary
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: boundary
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: boundary-worker
      initContainers:
        - name: render-config
          image: PLACEHOLDER_IMAGE
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              sed \
                -e "s|\${KMS_WORKER_AUTH_KEY}|$KMS_WORKER_AUTH_KEY|g" \
                /boundary-template/worker.hcl > /boundary/worker.hcl
          envFrom:
            - secretRef:
                name: boundary-kms-keys
          volumeMounts:
            - name: template
              mountPath: /boundary-template
            - name: config
              mountPath: /boundary
      containers:
        - name: boundary
          image: PLACEHOLDER_IMAGE
          command: ["boundary", "server", "-config", "/boundary/worker.hcl"]
          ports:
            - name: proxy
              containerPort: 9202
              protocol: TCP
            - name: ops
              containerPort: 9203
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /boundary
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: ops
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: ops
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: template
          configMap:
            name: boundary-worker
        - name: config
          emptyDir: {}
