apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: boundary-postgres
spec:
  instances: PLACEHOLDER_INSTANCES

  affinity:
    podAntiAffinityType: required

  postgresql:
    parameters:
      shared_buffers: "PLACEHOLDER_SHARED_BUFFERS"
      max_connections: "100"

  bootstrap:
    initdb:
      database: boundary
      owner: boundary
      secret:
        name: boundary-postgres-credentials

  storage:
    storageClass: PLACEHOLDER_STORAGE_CLASS
    size: PLACEHOLDER_STORAGE_SIZE
