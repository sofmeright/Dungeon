apiVersion: apps/v1
kind: Deployment
metadata:
  name: boundary-controller
  labels:
    app.kubernetes.io/name: boundary
    app.kubernetes.io/component: controller
spec:
  replicas: PLACEHOLDER_REPLICAS
  selector:
    matchLabels:
      app.kubernetes.io/name: boundary
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: boundary
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: boundary-controller
      initContainers:
        - name: render-config
          image: docker.io/alpine/k8s:1.34.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              sed \
                -e "s|\${KMS_ROOT_KEY}|$KMS_ROOT_KEY|g" \
                -e "s|\${KMS_WORKER_AUTH_KEY}|$KMS_WORKER_AUTH_KEY|g" \
                -e "s|\${KMS_RECOVERY_KEY}|$KMS_RECOVERY_KEY|g" \
                /boundary-template/controller.hcl > /boundary/controller.hcl
          envFrom:
            - secretRef:
                name: boundary-kms-keys
          volumeMounts:
            - name: template
              mountPath: /boundary-template
            - name: config
              mountPath: /boundary
      containers:
        - name: boundary
          image: PLACEHOLDER_IMAGE
          command: ["boundary", "server", "-config", "/boundary/controller.hcl"]
          ports:
            - name: api
              containerPort: 9200
              protocol: TCP
            - name: cluster
              containerPort: 9201
              protocol: TCP
            - name: ops
              containerPort: 9203
              protocol: TCP
          envFrom:
            - secretRef:
                name: boundary-conn-string
          volumeMounts:
            - name: config
              mountPath: /boundary
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: ops
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: ops
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: template
          configMap:
            name: boundary-controller
        - name: config
          emptyDir: {}
