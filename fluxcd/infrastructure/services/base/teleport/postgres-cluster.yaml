apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: teleport-postgres
spec:
  instances: PLACEHOLDER_INSTANCES
  imageName: ghcr.io/cloudnative-pg/postgresql:17

  affinity:
    podAntiAffinityType: required

  bootstrap:
    initdb:
      database: teleport
      owner: teleport
      secret:
        name: teleport-postgres-credentials

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: PLACEHOLDER_SHARED_BUFFERS
      wal_compression: "on"

  storage:
    storageClass: PLACEHOLDER_STORAGE_CLASS
    size: PLACEHOLDER_STORAGE_SIZE

  resources:
    requests:
      memory: "256Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
