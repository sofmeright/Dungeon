apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: teleport-postgres
spec:
  instances: PLACEHOLDER_INSTANCES
  imageName: PLACEHOLDER_IMAGE

  affinity:
    podAntiAffinityType: required

  bootstrap:
    initdb:
      database: teleport_backend
      owner: teleport
      secret:
        name: teleport-postgres-credentials
      postInitSQL:
        - CREATE DATABASE teleport_audit OWNER teleport
        - ALTER ROLE teleport WITH REPLICATION

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: PLACEHOLDER_SHARED_BUFFERS
      wal_compression: "on"
      wal_level: "logical"
      max_replication_slots: "10"

  storage:
    storageClass: PLACEHOLDER_STORAGE_CLASS
    size: PLACEHOLDER_STORAGE_SIZE

  resources:
    requests:
      memory: "256Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
