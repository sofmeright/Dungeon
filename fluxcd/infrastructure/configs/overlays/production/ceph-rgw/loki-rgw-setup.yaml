apiVersion: batch/v1
kind: Job
metadata:
  name: loki-rgw-setup
spec:
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        policy.prplanit.com/cap.ceph: "true"
        policy.prplanit.com/access-scope-ceph: "gorons-bracelet.rgw"
        istio.io/dataplane-mode: none
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: quay.io/ceph/ceph:v19
          env:
            - name: ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: loki-rgw-credentials
                  key: S3_ACCESS_KEY
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: loki-rgw-credentials
                  key: S3_SECRET_KEY
          command:
            - /bin/bash
            - /scripts/setup.sh
            - --user=loki-user
            - --display-name="Loki S3 User"
            - --buckets=loki-chunks,loki-ruler,loki-admin
          volumeMounts:
            - name: setup-script
              mountPath: /scripts
              readOnly: true
            - name: ceph-config
              mountPath: /etc/ceph/ceph.conf
              subPath: ceph.conf
              readOnly: true
            - name: ceph-keyring
              mountPath: /etc/ceph/ceph.client.dungeon-rgw.keyring
              subPath: keyring
              readOnly: true
      volumes:
        - name: setup-script
          configMap:
            name: ceph-rgw-setup-script
            defaultMode: 0755
        - name: ceph-config
          configMap:
            name: ceph-config
        - name: ceph-keyring
          secret:
            secretName: ceph-rgw-keyring
