apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: mutate-stunner-gateway
spec:
  background: true
  rules:
    - name: set-stunner-sa-on-deployment
      match:
        any:
          - resources:
              kinds: [Deployment]
              namespaces: ["swift-sail"]
              selector:
                matchLabels:
                  stunner.l7mp.io/owned-by: stunner
      preconditions:
        all:
          - key: "{{ request.object.metadata.labels.\"stunner.l7mp.io/related-gateway-name\" || '' }}"
            operator: NotEquals
            value: ""
      mutate:
        patchStrategicMerge:
          spec:
            template:
              spec:
                serviceAccountName: "{{ request.object.metadata.labels.\"stunner.l7mp.io/related-gateway-name\" }}"
    - name: set-stunner-lb-ip-on-service
      match:
        any:
          - resources:
              kinds: [Service]
              namespaces: ["swift-sail"]
              annotations:
                stunner.l7mp.io/related-gateway-name: "swift-sail/neko-gateway"
      mutate:
        patchStrategicMerge:
          metadata:
            annotations:
              lbipam.cilium.io/ips: "172.22.30.120"
