apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: mutate-redis-contract-labels
spec:
  background: true
  rules:
    # Inject contract labels on Redis replication StatefulSets.
    # The Redis operator CRD does not support custom pod labels,
    # so Kyverno is the only mechanism to add contract taxonomy labels.
    - name: set-redis-replication-contract-labels
      match:
        any:
          - resources:
              kinds: [StatefulSet]
              selector:
                matchLabels:
                  redis_setup_type: replication
      preconditions:
        all:
          - key: "{{ request.object.metadata.labels.app || '' }}"
            operator: NotEquals
            value: ""
      mutate:
        patchStrategicMerge:
          spec:
            template:
              metadata:
                labels:
                  policy.prplanit.com/access-class: redis
                  policy.prplanit.com/metrics: "true"
                  policy.prplanit.com/service-scope: "{{ request.object.metadata.namespace }}.{{ regex_replace_all('-redis$', request.object.metadata.labels.app, '') }}.redis"
    - name: set-redis-sentinel-metrics-label
      match:
        any:
          - resources:
              kinds: [StatefulSet]
              selector:
                matchLabels:
                  redis_setup_type: sentinel
      preconditions:
        all:
          - key: "{{ request.object.metadata.labels.app || '' }}"
            operator: NotEquals
            value: ""
      mutate:
        patchStrategicMerge:
          spec:
            template:
              metadata:
                labels:
                  policy.prplanit.com/metrics: "true"
