apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-gatus-to-xylem-gateway
spec:
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: xylem-gateway
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/gossip-stone/sa/gatus
      to:
        - operation:
            ports: ["80", "443"]
