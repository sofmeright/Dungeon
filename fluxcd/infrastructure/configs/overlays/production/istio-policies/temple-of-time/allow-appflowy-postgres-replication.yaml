apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-appflowy-postgres-replication
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: appflowy-postgres
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/temple-of-time/sa/appflowy-postgres
      to:
        - operation:
            ports: ["5432"]
