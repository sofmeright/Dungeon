apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-kimai-mariadb-galera
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: kimai-mariadb
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/temple-of-time/sa/kimai-mariadb
      to:
        - operation:
            ports: ["3306", "4567", "4568", "4444"]
