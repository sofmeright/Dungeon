apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-open-webui-redis-intra-cluster
spec:
  selector:
    matchLabels:
      app: open-webui-redis
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/temple-of-time/sa/open-webui-redis
              - cluster.local/ns/temple-of-time/sa/open-webui-sentinel
      to:
        - operation:
            ports: ["6379"]
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-open-webui-sentinel-intra-cluster
spec:
  selector:
    matchLabels:
      app: open-webui-sentinel
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/temple-of-time/sa/open-webui-sentinel
              - cluster.local/ns/temple-of-time/sa/open-webui-redis
      to:
        - operation:
            ports: ["26379"]
