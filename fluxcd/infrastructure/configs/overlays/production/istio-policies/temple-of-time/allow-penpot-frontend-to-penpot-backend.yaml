apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-penpot-frontend-to-penpot-backend
spec:
  selector:
    matchLabels:
      app: penpot-backend
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/temple-of-time/sa/penpot-frontend
              - cluster.local/ns/temple-of-time/sa/penpot-exporter
      to:
        - operation:
            ports: ["6060"]
