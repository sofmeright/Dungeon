apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-phloem-gateway-loadbalancer
spec:
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: phloem-gateway
  action: ALLOW
  rules:
    # Internet-facing gateway (pfSense forwards port 443)
    # Source IPs are unpredictable public clients — port-only restriction
    - to:
        - operation:
            ports: ["80", "443"]
