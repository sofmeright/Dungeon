apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-phloem-gateway-loadbalancer
spec:
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: phloem-gateway
  action: ALLOW
  rules:
    # Internet-facing gateway — source IPs are intentionally unrestricted here.
    # Access is limited only by exposed ports; pfSense/NAT provides perimeter control.
    - to:
        - operation:
            ports: ["80", "443"]
