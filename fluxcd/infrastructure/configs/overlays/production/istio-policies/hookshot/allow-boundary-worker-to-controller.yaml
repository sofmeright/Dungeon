apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-boundary-worker-to-controller
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: boundary
      app.kubernetes.io/component: controller
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/hookshot/sa/boundary-worker
      to:
        - operation:
            ports: ["9201"]
