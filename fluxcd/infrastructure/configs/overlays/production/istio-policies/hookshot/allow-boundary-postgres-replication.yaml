apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-boundary-postgres-replication
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: boundary-postgres
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/hookshot/sa/boundary-postgres
      to:
        - operation:
            ports: ["5432"]
