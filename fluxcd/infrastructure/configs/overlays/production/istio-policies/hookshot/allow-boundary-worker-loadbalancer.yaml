apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-boundary-worker-loadbalancer
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: boundary
      app.kubernetes.io/component: worker
  action: ALLOW
  rules:
    - from:
        - source:
            notPrincipals:
              - cluster.local/ns/*/sa/*
      to:
        - operation:
            ports: ["9202"]
