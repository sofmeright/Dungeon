apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-invoiceninja-nginx-to-invoiceninja-app
spec:
  selector:
    matchLabels:
      app: invoiceninja-app
  action: ALLOW
  rules:
    # nginx sidecar FastCGI-proxies to php-fpm via the invoiceninja-app
    # ClusterIP service (:9000), which routes back to the same pod.
    # Same SA since both containers share the pod identity.
    - from:
        - source:
            principals:
              - cluster.local/ns/hyrule-castle/sa/invoiceninja-app
      to:
        - operation:
            ports: ["9000"]
