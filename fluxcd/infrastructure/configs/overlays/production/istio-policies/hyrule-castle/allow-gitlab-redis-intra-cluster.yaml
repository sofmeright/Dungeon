apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-gitlab-redis-intra-cluster
spec:
  selector:
    matchLabels:
      app: gitlab-redis
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/hyrule-castle/sa/gitlab-redis
              - cluster.local/ns/hyrule-castle/sa/gitlab-sentinel
      to:
        - operation:
            ports: ["6379"]
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-gitlab-sentinel-intra-cluster
spec:
  selector:
    matchLabels:
      app: gitlab-sentinel-sentinel
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/hyrule-castle/sa/gitlab-sentinel
              - cluster.local/ns/hyrule-castle/sa/gitlab-redis
      to:
        - operation:
            ports: ["26379"]
