apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-gitlab-to-gitlab-praefect
spec:
  selector:
    matchLabels:
      app: praefect
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/hyrule-castle/sa/gitlab-webservice
              - cluster.local/ns/hyrule-castle/sa/gitlab-sidekiq
              - cluster.local/ns/hyrule-castle/sa/gitlab-toolbox
              - cluster.local/ns/hyrule-castle/sa/gitlab-gitlab-shell
              - cluster.local/ns/hyrule-castle/sa/gitlab-gitlab-exporter
      to:
        - operation:
            ports: ["8075", "9236"]
