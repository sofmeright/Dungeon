apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-gitlab-praefect-to-gitaly
spec:
  selector:
    matchLabels:
      app: gitaly
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/hyrule-castle/sa/gitlab-praefect
      to:
        - operation:
            ports: ["8075"]
