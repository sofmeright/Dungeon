apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-harbor-jobservice-to-harbor-core
spec:
  selector:
    matchLabels:
      app: harbor
      component: core
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/hyrule-castle/sa/harbor-jobservice
      to:
        - operation:
            ports: ["8080"]
