apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-neko-vpn-loadbalancer
spec:
  selector:
    matchLabels:
      app: neko-vpn
  action: ALLOW
  rules:
    # Internet-facing WebRTC — source IPs are unpredictable
    - to:
        - operation:
            ports: ["5340", "62001", "62002"]
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-neko-gateway-loadbalancer
spec:
  selector:
    matchLabels:
      app: stunner
  action: ALLOW
  rules:
    # Internet-facing TURN gateway — source IPs are unpredictable
    - to:
        - operation:
            ports: ["3478"]
