apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-ntfy-smtp-loadbalancer
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ntfy
  action: ALLOW
  rules:
    # Receives email from internet MTAs — source IPs are unpredictable
    - to:
        - operation:
            ports: ["25"]
