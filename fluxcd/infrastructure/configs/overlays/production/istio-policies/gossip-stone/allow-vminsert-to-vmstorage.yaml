apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-vminsert-to-vmstorage
spec:
  selector:
    matchLabels:
      app: vmstorage
  action: ALLOW
  rules:
    # vminsert writes to vmstorage on port 8400
    - from:
        - source:
            principals:
              - cluster.local/ns/gossip-stone/sa/vminsert
      to:
        - operation:
            ports: ["8400"]
    # vmselect reads from vmstorage on port 8401
    - from:
        - source:
            principals:
              - cluster.local/ns/gossip-stone/sa/vmselect
      to:
        - operation:
            ports: ["8401"]
