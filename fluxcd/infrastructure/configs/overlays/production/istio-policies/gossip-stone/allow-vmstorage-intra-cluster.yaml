apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-vmstorage-intra-cluster
spec:
  selector:
    matchLabels:
      app: vmstorage
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/gossip-stone/sa/vmstorage
      to:
        - operation:
            ports: ["8400", "8401", "8482"]
