apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-teleport-proxy-to-auth
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: teleport-cluster
      app.kubernetes.io/component: auth
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/zeldas-lullaby/sa/teleport-proxy
      to:
        - operation:
            ports: ["3025", "3026"]
