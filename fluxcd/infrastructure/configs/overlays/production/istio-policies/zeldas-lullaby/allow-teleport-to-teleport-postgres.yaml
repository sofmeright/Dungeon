apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-teleport-to-teleport-postgres
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: teleport-postgres
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/zeldas-lullaby/sa/teleport
      to:
        - operation:
            ports: ["5432"]
