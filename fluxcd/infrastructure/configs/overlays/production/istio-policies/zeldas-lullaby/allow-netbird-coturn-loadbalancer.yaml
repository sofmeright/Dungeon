apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-netbird-coturn-loadbalancer
spec:
  selector:
    matchLabels:
      app: netbird
      component: coturn
  action: ALLOW
  rules:
    # Internet-facing TURN/STUN — source IPs are unpredictable
    - to:
        - operation:
            ports: ["3478", "5349"]
