apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: xylem-gateway
  namespace: arylls-lookout
  annotations:
    lbipam.cilium.io/ips: "172.22.30.69"
    lbipam.cilium.io/sharing-key: "arylls-lookout"
    lbipam.cilium.io/sharing-cross-namespace: "*"
    service.cilium.io/loadbalancer-mode: "dsr"
spec:
  listeners:
    - name: https-pcfae
      tls:
        certificateRefs:
          - name: pcfae-com-tls
    - name: https-cr-pcfae
      protocol: HTTPS
      port: 443
      hostname: "*.cr.pcfae.com"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: cr-pcfae-com-tls
