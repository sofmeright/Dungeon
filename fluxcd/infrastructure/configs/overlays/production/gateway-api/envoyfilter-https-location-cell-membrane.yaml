apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: https-location-cell-membrane
  namespace: hyrule-castle
spec:
  workloadSelector:
    labels:
      gateway.networking.k8s.io/gateway-name: cell-membrane-gateway
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          portNumber: 443
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.router
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.lua.https_location
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            defaultSourceCode:
              inlineString: |
                function envoy_on_response(response_handle)
                  local location = response_handle:headers():get("location")
                  if location and location:find("^http://") then
                    local fixed = location:gsub("^http://", "https://", 1)
                    response_handle:headers():replace("location", fixed)
                  end
                end
