apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: https-location-xylem
  namespace: arylls-lookout
spec:
  workloadSelector:
    labels:
      gateway.networking.k8s.io/gateway-name: xylem-gateway
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          portNumber: 443
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.router
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.lua.https_location
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            defaultSourceCode:
              inlineString: |
                -- Rewrite Location: http:// to https:// on redirect responses.
                -- Backend apps behind TLS-terminating gateways often emit http://
                -- redirects because they see plaintext from the gateway. This
                -- causes Go/strict clients to follow the downgrade path and hit
                -- port 80, which is correctly denied by Cilium policy.
                function envoy_on_response(response_handle)
                  local location = response_handle:headers():get("location")
                  if location and location:find("^http://") then
                    local fixed = location:gsub("^http://", "https://", 1)
                    response_handle:headers():replace("location", fixed)
                  end
                end
