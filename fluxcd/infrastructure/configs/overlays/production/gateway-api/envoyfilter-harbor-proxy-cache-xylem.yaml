apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: harbor-proxy-cache-xylem
  namespace: arylls-lookout
spec:
  workloadSelector:
    labels:
      gateway.networking.k8s.io/gateway-name: xylem-gateway
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          portNumber: 443
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.router
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.lua.harbor_proxy_cache
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            defaultSourceCode:
              inlineString: |
                -- Harbor proxy cache transparent registry v2 fixup.
                --
                -- Problem: Docker registry v2 auth flow embeds the repository
                -- path in the token scope. Our HTTPRoute rewrites /v2/<image>
                -- to /v2/<project>/<image>, but the token was issued for
                -- <image> not <project>/<image> — scope mismatch.
                --
                -- Fix:
                --   1. On /v2/ ping response: rewrite WWW-Authenticate realm
                --      to use the proxy-cache subdomain (so token requests
                --      come back through this filter).
                --   2. On /service/token request: inject the project prefix
                --      into the scope query parameter.

                local PROJECT_MAP = {
                  ["docker.cr.pcfae.com"] = "docker-cache",
                  ["ghcr.cr.pcfae.com"]   = "ghcr-cache",
                  ["quay.cr.pcfae.com"]   = "quay-cache",
                  ["lscr.cr.pcfae.com"]   = "lscr-cache",
                }

                function envoy_on_request(request_handle)
                  local host = request_handle:headers():get(":authority")
                  if not host then return end

                  -- Strip port if present
                  local hostname = host:match("^([^:]+)")
                  local project = PROJECT_MAP[hostname]
                  if not project then return end

                  -- Store hostname in dynamic metadata for response phase
                  request_handle:streamInfo():dynamicMetadata():set(
                    "harbor_proxy_cache", "hostname", hostname
                  )

                  local path = request_handle:headers():get(":path")
                  if not path then return end

                  -- Inject library/ for official Docker Hub images (single-name).
                  -- /v2/docker/manifests/... → /v2/library/docker/manifests/...
                  -- /v2/prplanit/stagefreight/manifests/... → unchanged
                  -- Must run before HTTPRoute adds the project prefix.
                  if path:find("^/v2/") and not path:find("^/v2/$") then
                    local image, rest = path:match("^/v2/([^/]+)/(.+)$")
                    if image and rest then
                      if rest:find("^manifests/") or rest:find("^blobs/") or rest:find("^tags/") then
                        request_handle:headers():replace(":path", "/v2/library/" .. image .. "/" .. rest)
                        path = "/v2/library/" .. image .. "/" .. rest
                      end
                    end
                  end

                  -- Rewrite scope in token requests:
                  -- Inject project prefix and library/ for official images.
                  -- Handles both plain (scope=repository:X:action) and
                  -- URL-encoded (scope=repository%3AX%3Aaction) formats.
                  -- Single-name images (no slash) are Docker Hub official
                  -- and need library/ prefix (e.g. docker → library/docker).
                  if path:find("^/service/token") then
                    local function inject(s, colon, slash)
                      local pat = "scope=repository" .. colon
                      local pfx = project .. slash
                      -- Skip if already prefixed
                      if s:find(pat .. pfx, 1, true) then return s end
                      -- Extract image+action after scope=repository:
                      local img = s:match(pat .. "([^&]+)")
                      if not img then return s end
                      -- Single-name image (no slash) = official, needs library/
                      if img:find(slash, 1, true) then
                        return s:gsub(pat, pat .. pfx, 1)
                      else
                        return s:gsub(pat, pat .. pfx .. "library" .. slash, 1)
                      end
                    end
                    local new_path = path
                    if path:find("scope=repository%%3A") then
                      new_path = inject(path, "%%3A", "%%2F")
                    elseif path:find("scope=repository:") then
                      new_path = inject(path, ":", "/")
                    end
                    if new_path ~= path then
                      request_handle:headers():replace(":path", new_path)
                    end
                  end
                end

                function envoy_on_response(response_handle)
                  local meta = response_handle:streamInfo():dynamicMetadata():get(
                    "harbor_proxy_cache", "hostname"
                  )
                  if not meta then return end

                  local hostname = meta
                  if not PROJECT_MAP[hostname] then return end

                  -- Rewrite WWW-Authenticate realm to use the proxy-cache
                  -- subdomain so Docker sends token requests back here.
                  local www_auth = response_handle:headers():get("www-authenticate")
                  if www_auth then
                    local new_auth = www_auth:gsub(
                      'realm="https://cr%.pcfae%.com/',
                      'realm="https://' .. hostname .. '/'
                    )
                    if new_auth ~= www_auth then
                      response_handle:headers():replace("www-authenticate", new_auth)
                    end
                  end
                end
