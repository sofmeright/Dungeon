apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: fairer-pages-error-handler
  namespace: kokiri-forest
spec:
  workloadSelector:
    labels:
      gateway.networking.k8s.io/gateway-name: phloem-gateway
  configPatches:
    # Add Lua filter for error interception
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: envoy.filters.network.http_connection_manager
              subFilter:
                name: envoy.filters.http.router
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.lua
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            defaultSourceCode:
              inlineString: |
                -- fairer-pages error handler
                -- Intercepts error responses for browser HTML document navigations only.
                -- Does NOT rewrite API, WebSocket, upgrade, or non-document traffic.

                function envoy_on_request(request_handle)
                  local path = request_handle:headers():get(":path") or ""
                  local method = request_handle:headers():get(":method") or ""

                  -- Skip fairer-pages requests to prevent infinite redirect loops
                  if string.match(path, "^/fairer%-pages/") then
                    request_handle:streamInfo():dynamicMetadata():set("fairer_pages", "skip", "true")
                    return
                  end

                  -- Only intercept safe/idempotent methods (GET, HEAD)
                  if method ~= "GET" and method ~= "HEAD" then
                    return
                  end

                  -- Never intercept API paths — apps expect raw status codes
                  if string.match(path, "^/api/") then
                    return
                  end

                  -- Never intercept auth paths
                  if string.match(path, "^/auth/") then
                    return
                  end

                  -- Never intercept WebSocket/upgrade requests
                  local upgrade = request_handle:headers():get("upgrade") or ""
                  if string.lower(upgrade) == "websocket" then
                    return
                  end

                  local connection = request_handle:headers():get("connection") or ""
                  if string.match(string.lower(connection), "upgrade") then
                    return
                  end

                  if request_handle:headers():get("sec-websocket-key") then
                    return
                  end

                  -- Only intercept browser HTML document requests
                  local accept = request_handle:headers():get("accept") or ""
                  if string.match(accept, "text/html") then
                    request_handle:streamInfo():dynamicMetadata():set("fairer_pages", "browser", "true")
                  end
                end

                function envoy_on_response(response_handle)
                  local meta = response_handle:streamInfo():dynamicMetadata():get("fairer_pages")
                  if not meta then return end
                  if meta["skip"] == "true" then return end
                  if meta["browser"] ~= "true" then return end

                  local status = response_handle:headers():get(":status")
                  local status_num = tonumber(status)

                  -- Error codes to intercept with custom error pages
                  local error_codes = {
                    [400] = true, [401] = true, [403] = true, [404] = true,
                    [405] = true, [408] = true, [410] = true, [429] = true,
                    [500] = true, [502] = true, [503] = true, [504] = true
                  }

                  if error_codes[status_num] then
                    local html = '<!DOCTYPE html><html><head><meta charset="UTF-8">'
                      .. '<title>Error ' .. status .. '</title>'
                      .. '<style>*{margin:0;padding:0}html,body{height:100%;overflow:hidden}'
                      .. 'iframe{width:100%;height:100%;border:none}</style></head>'
                      .. '<body><iframe src="/fairer-pages/playlist/random/'
                      .. status .. '.html"></iframe></body></html>'

                    response_handle:headers():replace("content-type", "text/html; charset=utf-8")
                    response_handle:headers():remove("content-encoding")
                    response_handle:headers():replace("content-length", tostring(#html))
                    response_handle:headers():add("cache-control", "no-cache, no-store, must-revalidate")
                    response_handle:headers():add("x-original-status", status)

                    local body = response_handle:body()
                    if body then
                      body:setBytes(html)
                    end
                  end
                end
