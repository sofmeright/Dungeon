apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - storage  # Production storage classes (Ceph RBD + CephFS)
  - cilium
  - cilium-policies  # CiliumClusterwideNetworkPolicies for L3/L4 defense-in-depth
  # - metallb  # Disabled - replaced by Cilium LoadBalancer IPAM
  - weave-gitops
  - ceph-rbd  # Ceph RBD connection config and secrets
  - ceph-fs  # CephFS root access + static volumes
  - ceph-rgw  # Ceph RGW keyring for S3 object storage
  - ceph-rook-ceph  # Rook external Ceph cluster connection secrets
  - volume-snapshot-class  # VolumeSnapshotClass (requires snapshot-controller CRDs)
  - vault  # Bank-Vaults with SOPS-encrypted keys
  - velero  # Backup and disaster recovery credentials
  - zitadel  # Identity and Access Management
  - adguard  # DNS filtering and ad blocking
  - grafana  # Grafana admin credentials
  - loki  # Loki S3 credentials for log storage
  - loki-ingest  # Loki gateway basic auth for external ingest
  - vminsert-ingest  # VictoriaMetrics vminsert basic auth for external ingest
  - alloy-ingest  # Alloy vminsert auth credentials (lakitu namespace)
  - prometheus  # Prometheus S3 credentials for metric storage
  - prometheus-exporter-eaton-ups  # Eaton UPS exporter credentials
  - prometheus-exporter-pve  # Proxmox VE exporter credentials
  - gateway-api  # Gateway API resources (implemented by Istio) with TLS certificates
  - cert-manager  # TLS certificates and Cloudflare credentials
  - registries/cr.pcfae.com-admin  # Container registry pull credentials
  - registries/docker.io-prplanit  # Docker Hub pull credentials (temple-of-time)
  - registries/docker-io-shared  # Docker Hub pull credentials (shared across namespaces)
  - gitlab  # GitLab SMTP and OIDC credentials
  - chrony  # NTP server configuration
  - coredns  # Cluster DNS forward config
  - istio-policies  # Istio AuthorizationPolicies for all meshed namespaces
  - kyverno-policies  # Kyverno ClusterPolicies for SA enforcement and sentinel SA mutation
  - stagefreight-reconciler  # RBAC for CI OIDC-bound Flux reconciliation
  - kubeadm-oidc  # kube-apiserver OIDC config for GitLab CI identity
