apiVersion: v1
kind: ConfigMap
metadata:
  name: chrony-config
data:
  # Proxmox hypervisors as upstream NTP sources (stratum 2 from public pools)
  NTP_SERVERS: "avocado,bamboo,cosmos,dragonfruit,eggplant"

  # Additional chrony directives injected after server lines
  # ratelimit: rate-limit NTP client requests
  # rtcsync: sync system RTC periodically
  NTP_DIRECTIVES: "ratelimit\nrtcsync"

  # Production logging settings
  LOG_LEVEL: "0"
  NOCLIENTLOG: "false"

  # yamllint disable rule:comments-indentation
  # Security features (commented options from your docker-compose)
  # ENABLE_NTS: "true"
  # ENABLE_SYSCLK: "true"
  # yamllint enable rule:comments-indentation
