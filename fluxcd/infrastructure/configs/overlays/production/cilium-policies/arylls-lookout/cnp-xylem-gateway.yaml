apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-xylem-gateway-lan
spec:
  description: >-
    LAN ingress to xylem-gateway (172.22.30.69). Internal services only —
    no pfSense port forward. RFC1918 allowed minus pod CIDR to prevent
    identity bypass via LB IP. pfSense owns LAN segment access control.
  enableDefaultDeny:
    ingress: false
    egress: false
  endpointSelector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: xylem-gateway
  ingress:
    - fromCIDRSet:
        - cidr: "10.0.0.0/8"
        - cidr: "172.16.0.0/12"
        - cidr: "192.168.0.0/16"
          except:
            - "192.168.144.0/20"
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
            - port: "443"
              protocol: TCP
    # S3 consumer pods reaching s3.pcfae.com via xylem-gateway
    # CNP fromEndpoints requires explicit namespace for cross-namespace match
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: hyrule-castle
            policy.prplanit.com/cap.s3: "true"
            policy.prplanit.com/access-scope-s3: "gorons-bracelet.rgw"
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: temple-of-time
            policy.prplanit.com/cap.s3: "true"
            policy.prplanit.com/access-scope-s3: "gorons-bracelet.rgw"
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: gossip-stone
            policy.prplanit.com/cap.s3: "true"
            policy.prplanit.com/access-scope-s3: "gorons-bracelet.rgw"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Cross-namespace monitoring probes
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: gossip-stone
            app.kubernetes.io/name: gatus
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: gossip-stone
            app: uptime-kuma
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Node health checks and DSR return path
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
            - port: "443"
              protocol: TCP
