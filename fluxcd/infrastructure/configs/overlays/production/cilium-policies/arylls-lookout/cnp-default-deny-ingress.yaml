apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  description: >-
    Default-deny ingress for arylls-lookout namespace.
    Gateway pods get LAN-only CIDR ingress via cnp-xylem-gateway.
    CCNPs provide: kubelet-probes, istio-ambient, prometheus-scrape.
  enableDefaultDeny:
    ingress: true
    egress: false
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            policy.prplanit.com/reserved: default-deny-anchor
