apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  description: >-
    Default-deny ingress for lost-woods namespace.
    Homarr DB access covered by contract CCNPs (has labels).
    All apps have ingress labels — CCNPs cover kubelet-probes,
    istio-ambient, prometheus-scrape, and ingress-gateway traffic.
  enableDefaultDeny:
    ingress: true
    egress: false
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            policy.prplanit.com/reserved: default-deny-anchor
