apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ntfy-smtp-lan
spec:
  description: >-
    LAN-only SMTP ingress to ntfy (172.22.30.102) on port 25.
    Internal services send notifications via SMTP.
  enableDefaultDeny:
    ingress: false
    egress: false
  endpointSelector:
    matchLabels:
      app: ntfy
  ingress:
    - fromCIDRSet:
        - cidr: "10.0.0.0/8"
        - cidr: "172.16.0.0/12"
          except:
            - "172.22.144.0/24"
        - cidr: "192.168.0.0/16"
          except:
            - "192.168.144.0/20"
      toPorts:
        - ports:
            - port: "25"
              protocol: TCP
