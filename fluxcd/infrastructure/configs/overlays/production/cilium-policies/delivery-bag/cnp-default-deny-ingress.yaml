apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  description: >-
    Default-deny ingress for delivery-bag namespace.
    ntfy gets ingress from ingress-backend CCNP (gateway → 8080).
    SMTP LB gets LAN-only CIDR ingress via cnp-ntfy-smtp.
  enableDefaultDeny:
    ingress: true
    egress: false
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            policy.prplanit.com/reserved: default-deny-anchor
