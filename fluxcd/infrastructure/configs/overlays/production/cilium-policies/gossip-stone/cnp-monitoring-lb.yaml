apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-graphite-exporter-truenas-lan
spec:
  description: >-
    LAN-only ingress to graphite-exporter-truenas (172.22.30.137) on 2003/TCP.
  enableDefaultDeny:
    ingress: false
    egress: false
  endpointSelector:
    matchLabels:
      app: graphite-exporter-truenas
  ingress:
    - fromCIDRSet:
        - cidr: "10.0.0.0/8"
        - cidr: "172.16.0.0/12"
        - cidr: "192.168.0.0/16"
          except:
            - "192.168.144.0/20"
      toPorts:
        - ports:
            - port: "2003"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-nutify-lan
