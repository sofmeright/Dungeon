apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-vmstorage-internal
spec:
  description: >-
    Allow vminsert and vmselect to reach vmstorage on
    8400,8401,8482/TCP (insert, select, http).
  enableDefaultDeny:
    ingress: false
    egress: false
  endpointSelector:
    matchLabels:
      app: vmstorage
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: vminsert
        - matchLabels:
            app: vmselect
      toPorts:
        - ports:
            - port: "8400"
              protocol: TCP
            - port: "8401"
              protocol: TCP
            - port: "8482"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-vminsert-internal
spec:
  description: >-
    Allow Alloy (host/remote-node) to push metrics to vminsert on 8480/TCP.
  enableDefaultDeny:
    ingress: false
    egress: false
  endpointSelector:
    matchLabels:
      app: vminsert
  ingress:
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-vmselect-internal
spec:
  description: >-
    Allow Grafana pods and Alloy (host/remote-node) to query
    vmselect on 8481/TCP.
  enableDefaultDeny:
    ingress: false
    egress: false
  endpointSelector:
    matchLabels:
      app: vmselect
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: grafana
      toPorts:
        - ports:
            - port: "8481"
              protocol: TCP
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8481"
              protocol: TCP
