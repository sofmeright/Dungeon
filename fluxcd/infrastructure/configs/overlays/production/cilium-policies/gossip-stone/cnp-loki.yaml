apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-loki-internal
spec:
  description: >-
    Allow loki-gateway to reach loki on 3100/TCP, and loki pods to
    communicate on 7946/TCP (memberlist) and 9095/TCP (gRPC).
  enableDefaultDeny:
    ingress: false
    egress: false
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: loki
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: loki
            app.kubernetes.io/component: gateway
      toPorts:
        - ports:
            - port: "3100"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: loki
      toPorts:
        - ports:
            - port: "7946"
              protocol: TCP
            - port: "9095"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-loki-gateway-internal
spec:
  description: >-
    Allow Alloy (host/remote-node), Grafana, and kube-apiserver to reach
    loki-gateway on 8080/TCP (containerPort). Service port 80 maps to
    targetPort 8080 via named port http-metrics.
  enableDefaultDeny:
    ingress: false
    egress: false
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: loki
      app.kubernetes.io/component: gateway
  ingress:
    - fromEntities:
        - host
        - remote-node
        - kube-apiserver
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            app: grafana
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
