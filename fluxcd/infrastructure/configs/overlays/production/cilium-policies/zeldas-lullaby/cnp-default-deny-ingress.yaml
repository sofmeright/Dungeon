apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  description: >-
    Default-deny ingress for zeldas-lullaby namespace.
    Administrative services: vault, zitadel, external-secrets, kyverno,
    netbird, netbox, oauth2-proxy, semaphore, twofauth, unifi, vaultwarden.
    CCNPs cover kubelet-probes, istio-ambient, prometheus-scrape,
    postgres/redis contracts, and ingress-gateway traffic for labeled pods.
  enableDefaultDeny:
    ingress: true
    egress: false
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            policy.prplanit.com/reserved: default-deny-anchor
