apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  description: >-
    Default-deny ingress for tingle-tuner namespace.
    Most apps have ingress labels — CCNPs cover kubelet-probes,
    istio-ambient, prometheus-scrape, and ingress-gateway traffic.
    searxng-redis has contract labels covered by redis contract CCNP.
  enableDefaultDeny:
    ingress: true
    egress: false
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            policy.prplanit.com/reserved: default-deny-anchor
