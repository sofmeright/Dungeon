apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-chrony-ntp-lan
spec:
  description: >-
    LAN-only NTP ingress to chrony (172.22.30.122) on port 123/UDP.
  enableDefaultDeny:
    ingress: false
    egress: false
  endpointSelector:
    matchLabels:
      app: chrony
  ingress:
    - fromCIDRSet:
        - cidr: "10.0.0.0/8"
        - cidr: "172.16.0.0/12"
        - cidr: "192.168.0.0/16"
          except:
            - "192.168.144.0/20"
      toPorts:
        - ports:
            - port: "123"
              protocol: UDP
