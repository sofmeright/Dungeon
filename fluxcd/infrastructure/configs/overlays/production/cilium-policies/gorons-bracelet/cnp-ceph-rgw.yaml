apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ceph-rgw-lan
spec:
  description: >-
    LAN-only S3 ingress to ceph-rgw (172.22.30.101) on port 8080/TCP.
  enableDefaultDeny:
    ingress: false
    egress: false
  endpointSelector:
    matchLabels:
      app: ceph-rgw
  ingress:
    - fromCIDRSet:
        - cidr: "10.0.0.0/8"
        - cidr: "172.16.0.0/12"
        - cidr: "192.168.0.0/16"
          except:
            - "192.168.144.0/20"
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ceph-rgw-cluster
spec:
  description: >-
    Allow xylem-gateway (TLS termination for s3.pcfae.com) and cap.ceph
    admin jobs to reach raw RGW on port 8080.
  enableDefaultDeny:
    ingress: false
    egress: false
  endpointSelector:
    matchLabels:
      app: ceph-rgw
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: arylls-lookout
            gateway.networking.k8s.io/gateway-name: xylem-gateway
        - matchLabels:
            policy.prplanit.com/cap.ceph: "true"
            policy.prplanit.com/access-scope-ceph: "gorons-bracelet.rgw"
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
