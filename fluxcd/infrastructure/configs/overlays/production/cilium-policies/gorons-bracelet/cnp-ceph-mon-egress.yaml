apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ceph-mon-egress
spec:
  description: >-
    Allow cap.ceph pods (scoped to gorons-bracelet.rgw) to reach external
    Ceph MONs on ports 6789/3300 TCP. These pods are un-meshed because
    RADOS is a non-HTTP protocol that ztunnel cannot handle.
  enableDefaultDeny:
    ingress: false
    egress: false
  endpointSelector:
    matchLabels:
      policy.prplanit.com/cap.ceph: "true"
      policy.prplanit.com/access-scope-ceph: "gorons-bracelet.rgw"
  egress:
    - toCIDRSet:
        - cidr: "fc00:f1:ada:104e:1ace::/64"
      toPorts:
        - ports:
            - port: "6789"
              protocol: TCP
            - port: "3300"
              protocol: TCP
