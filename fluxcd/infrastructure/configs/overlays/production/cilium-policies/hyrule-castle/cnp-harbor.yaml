spec:
  description: >-
    Allow harbor-core and harbor-nginx to reach harbor-portal on 8080/TCP.
  enableDefaultDeny:
    ingress: false
    egress: false
  endpointSelector:
    matchLabels:
      app: harbor
      component: portal
  ingress:
