apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-harbor-nginx-to-core
spec:
  description: >-
    Allow harbor-nginx to reach harbor-core on 8080/TCP.
  enableDefaultDeny:
    ingress: false
    egress: false
  endpointSelector:
    matchLabels:
      app: harbor
      component: core
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: harbor
            component: nginx
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
