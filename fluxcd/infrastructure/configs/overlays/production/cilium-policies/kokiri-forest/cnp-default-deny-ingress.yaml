apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  description: >-
    Default-deny ingress for kokiri-forest namespace.
    Gateway pods get world ingress via cnp-phloem-gateway.
    linkstack gets ingress from ingress-backend CCNP.
    linkstack-db gets ingress from linkstack via cnp-linkstack-db.
  enableDefaultDeny:
    ingress: true
    egress: false
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            policy.prplanit.com/reserved: default-deny-anchor
