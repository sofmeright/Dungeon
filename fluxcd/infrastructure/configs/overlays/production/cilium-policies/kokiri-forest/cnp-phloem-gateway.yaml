apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-phloem-gateway-world
spec:
  description: >-
    Internet-facing ingress to phloem-gateway (172.22.30.70).
    pfSense forwards port 443 to this IP for personal/public domains.
  enableDefaultDeny:
    ingress: false
    egress: false
  endpointSelector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: phloem-gateway
  ingress:
    - fromEntities:
        - world
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
            - port: "443"
              protocol: TCP
