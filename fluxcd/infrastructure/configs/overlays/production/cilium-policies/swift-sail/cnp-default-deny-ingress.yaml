apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  description: >-
    Default-deny ingress for swift-sail namespace.
    Arr apps get ingress from ingress-backend CCNP (gateway → 8080).
    LB services get LAN-only CIDR rules.
  enableDefaultDeny:
    ingress: true
    egress: false
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            policy.prplanit.com/reserved: default-deny-anchor
