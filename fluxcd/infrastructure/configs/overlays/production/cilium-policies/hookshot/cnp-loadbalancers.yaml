apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-boundary-worker-lan
spec:
  description: >-
    LAN-only ingress to boundary-worker (172.22.30.88) on 9202/TCP.
  enableDefaultDeny:
    ingress: false
    egress: false
  endpointSelector:
    matchLabels:
      app: boundary-worker
  ingress:
    - fromCIDRSet:
        - cidr: "10.0.0.0/8"
        - cidr: "172.16.0.0/12"
          except:
            - "172.22.144.0/24"
        - cidr: "192.168.0.0/16"
          except:
            - "192.168.144.0/20"
      toPorts:
        - ports:
            - port: "9202"
              protocol: TCP
---
