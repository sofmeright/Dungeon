apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-boundary-worker-lan
spec:
  description: >-
    LAN-only ingress to boundary-worker (172.22.30.88) on 9202/TCP.
  enableDefaultDeny:
    ingress: false
    egress: false
  endpointSelector:
    matchLabels:
      app: boundary-worker
  ingress:
    - fromCIDRSet:
        - cidr: "10.0.0.0/8"
        - cidr: "172.16.0.0/12"
        - cidr: "192.168.0.0/16"
          except:
            - "192.168.144.0/20"
      toPorts:
        - ports:
            - port: "9202"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-rustdesk-lan
spec:
  description: >-
    LAN + internet ingress to rustdesk (172.22.30.8). Single StatefulSet
    with hbbs (server) and hbbr (relay) containers. Ports: 21114-21116
    (server TCP + UDP), 21117-21119 (relay TCP), 21118 (server TCP).
  enableDefaultDeny:
    ingress: false
    egress: false
  endpointSelector:
    matchLabels:
      app: rustdesk
  ingress:
    - fromCIDRSet:
        - cidr: "10.0.0.0/8"
        - cidr: "172.16.0.0/12"
        - cidr: "192.168.0.0/16"
          except:
            - "192.168.144.0/20"
      toPorts:
        - ports:
            - port: "21114"
              protocol: TCP
            - port: "21115"
              protocol: TCP
            - port: "21116"
              protocol: TCP
            - port: "21116"
              protocol: UDP
            - port: "21117"
              protocol: TCP
            - port: "21118"
              protocol: TCP
            - port: "21119"
              protocol: TCP
    - fromEntities:
        - world
      toPorts:
        - ports:
            - port: "21114"
              protocol: TCP
            - port: "21115"
              protocol: TCP
            - port: "21116"
              protocol: TCP
            - port: "21116"
              protocol: UDP
            - port: "21117"
              protocol: TCP
            - port: "21118"
              protocol: TCP
            - port: "21119"
              protocol: TCP
