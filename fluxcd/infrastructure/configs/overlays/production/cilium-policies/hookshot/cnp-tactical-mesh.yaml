apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-tactical-nats-internal
spec:
  description: >-
    Allow tactical-backend, tactical-celery, and tactical-celerybeat
    to reach tactical-nats on 4222/TCP.
  enableDefaultDeny:
    ingress: false
    egress: false
  endpointSelector:
    matchLabels:
      app: tactical-nats
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: tactical-backend
        - matchLabels:
            app: tactical-celery
        - matchLabels:
            app: tactical-celerybeat
      toPorts:
        - ports:
            - port: "4222"
              protocol: TCP
---
