apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  description: >-
    Default-deny ingress for fairy-bottle namespace.
    Velero, node-agent, snapshot-controller, and kopia jobs are
    primarily egress consumers (kube-apiserver, S3). Ingress allows
    from CCNPs: kubelet-probes, istio-ambient, prometheus-scrape.
    The fromEndpoints selector matches no real pods — it exists only
    to satisfy the Cilium CRD schema requirement for an ingress field.
  enableDefaultDeny:
    ingress: true
    egress: false
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            policy.prplanit.com/reserved: default-deny-anchor
