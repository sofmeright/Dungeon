apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-istiod-xds
spec:
  description: >-
    Allow ztunnel and gateway pods to reach istiod for xDS on 15012.
    Port 15014 is istiod debug/monitoring (prometheus scrape).
    Port 443 webhook is handled by ccnp-allow-kube-apiserver-webhooks
    via the webhook label — explicit kube-apiserver rule here as backup
    until the webhook label rolls to the istiod pod.
  enableDefaultDeny:
    ingress: false
    egress: false
  endpointSelector:
    matchLabels:
      app: istiod
  ingress:
    # ztunnel xDS — all ztunnel pods connect for workload config
    - fromEndpoints:
        - matchLabels:
            app: ztunnel
      toPorts:
        - ports:
            - port: "15012"
              protocol: TCP
    # Gateway pods xDS — all gateway instances connect for route config
    - fromEndpoints:
        - matchLabels:
            gateway.networking.k8s.io/gateway-class-name: istio
      toPorts:
        - ports:
            - port: "15012"
              protocol: TCP
    # kube-apiserver webhook validation on 443
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
