apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-stunner-internal
spec:
  description: >-
    Allow STUNner gateway pods to reach stunner-auth (8088) and
    stunner-config-discovery (13478) within king-of-red-lions.
  enableDefaultDeny:
    ingress: false
    egress: false
  endpointSelector:
    matchLabels:
      app: stunner-auth
  ingress:
    - toPorts:
        - ports:
            - port: "8088"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-stunner-config-discovery
spec:
  enableDefaultDeny:
    ingress: false
    egress: false
  endpointSelector:
    matchLabels:
      app: stunner-config-discovery
  ingress:
    - toPorts:
        - ports:
            - port: "13478"
              protocol: TCP
