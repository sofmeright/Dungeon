apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  description: >-
    Default-deny ingress for king-of-red-lions namespace.
    Baseline allows from CCNPs: kubelet-probes, istio-ambient,
    dns-egress, kube-apiserver-webhooks (cert-manager-webhook, istiod).
  enableDefaultDeny:
    ingress: true
    egress: false
  endpointSelector: {}
  ingress:
    - {}
