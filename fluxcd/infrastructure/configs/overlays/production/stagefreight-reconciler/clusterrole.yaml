apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: stagefreight-reconciler
rules:
  # Reconcile Flux Kustomizations
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "patch", "watch"]
  # Reconcile Flux GitRepositories (source refresh)
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["gitrepositories"]
    verbs: ["get", "list", "patch", "watch"]
  # Read HelmReleases (status checks, no mutation)
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list", "watch"]
  # k8s-inventory: discover workloads
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
  # k8s-inventory: discover services + routes
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list"]
