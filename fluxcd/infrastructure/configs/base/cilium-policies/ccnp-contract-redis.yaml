apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: contract-redis
spec:
  description: >-
    Backend-class admission gate for redis. Allows redis-capable pods
    to reach redis servers on 6379. This CCNP enforces class membership
    (cap + scope annotation exists), NOT instance binding. Instance-level
    authorization (client scope value == server scope value) requires
    per-service CNPs. Without those, any scoped redis-capable client
    can reach any redis server.
  enableDefaultDeny:
    egress: false
    ingress: false
  endpointSelector:
    matchLabels:
      policy.prplanit.com/access-class: redis
    matchExpressions:
      - key: policy.prplanit.com/service-scope
        operator: Exists
  ingress:
    - fromEndpoints:
        # Legacy client-role label — remove after capability migration
        - matchLabels:
            policy.prplanit.com/client-redis: "true"
          matchExpressions:
            - key: policy.prplanit.com/access-scope-redis
              operator: Exists
        # Capability label model
        - matchLabels:
            policy.prplanit.com/cap.redis: "true"
          matchExpressions:
            - key: policy.prplanit.com/access-scope-redis
              operator: Exists
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
