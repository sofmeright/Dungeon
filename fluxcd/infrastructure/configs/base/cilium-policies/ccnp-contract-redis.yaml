apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: contract-redis
spec:
  description: >-
    Contract: redis client pods may reach redis server pods on port 6379.
    Two-dimensional: server uses access-class + service-scope, client uses
    client-redis + access-scope-redis. Per-protocol client labels avoid
    single-value collisions on multi-backend pods.
    Exact scope value matching is enforced in Phase 3 per-service CNPs.
  enableDefaultDeny:
    egress: false
    ingress: false
  endpointSelector:
    matchLabels:
      policy.prplanit.com/access-class: redis
    matchExpressions:
      - key: policy.prplanit.com/service-scope
        operator: Exists
  ingress:
    - fromEndpoints:
        - matchLabels:
            policy.prplanit.com/client-redis: "true"
          matchExpressions:
            - key: policy.prplanit.com/access-scope-redis
              operator: Exists
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
