apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-dns-egress
spec:
  description: >-
    Allows all pods to reach CoreDNS (kube-dns) and node-local DNS cache
    on port 53 UDP/TCP. Without DNS, nothing works. This is a universal
    egress allowance that must exist before any default-deny is enabled.
  enableDefaultDeny:
    egress: false
    ingress: false
  endpointSelector: {}
  egress:
    # Allow DNS queries to CoreDNS in kube-system
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:io.cilium.k8s.policy.serviceaccount: coredns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Allow DNS queries to node-local DNS cache (169.254.20.10)
    - toCIDR:
        - "169.254.20.10/32"
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
