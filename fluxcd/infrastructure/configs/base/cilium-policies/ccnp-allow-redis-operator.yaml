apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-redis-operator
spec:
  description: >-
    Allows Redis operator to manage Redis replication instances.
    The operator in gorons-bracelet needs to reach Redis pods
    on port 6379 for health checks and configuration.
  enableDefaultDeny:
    egress: false
    ingress: false
  endpointSelector:
    matchLabels:
      redis_setup_type: replication
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: gorons-bracelet
            app.kubernetes.io/name: redis-operator
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
