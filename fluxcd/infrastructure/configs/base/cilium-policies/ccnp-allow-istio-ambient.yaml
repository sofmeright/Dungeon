apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-istio-ambient
spec:
  description: >-
    Egress-only HBONE allowance. Ingress HBONE is now owned by
    ccnp-ambient-mesh-guardrail which restricts port 15008 ingress
    to ztunnel identity only (not all pods). This policy retains
    egress 15008 so source pods can initiate HBONE connections to
    remote ztunnels if egress deny is ever enabled.
  enableDefaultDeny:
    egress: false
    ingress: false
  endpointSelector: {}
  egress:
    # Allow outbound HBONE mTLS tunnel traffic
    - toPorts:
        - ports:
            - port: "15008"
              protocol: TCP
