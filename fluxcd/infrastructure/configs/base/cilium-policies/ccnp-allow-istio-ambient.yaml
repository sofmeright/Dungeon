apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-istio-ambient
spec:
  description: >-
    Allows Istio Ambient ztunnel HBONE traffic cluster-wide.
    Port 15008 is the mTLS tunnel for all ambient pod-to-pod communication.
    The 169.254.7.127/32 CIDR rule is NOT a general probe allowance — it
    covers specifically the case where Istio ambient iptables SNAT the
    kubelet probe source IP to this link-local address before Cilium
    processes it. Cilium cannot map this rewritten IP to the host entity,
    so fromEntities: [host] in ccnp-allow-kubelet-probes does not cover it.
    Both policies are required: kubelet-probes for native kubelet identity,
    this policy for Istio-rewritten probe source IPs.
    enableDefaultDeny is false — purely additive.
  enableDefaultDeny:
    egress: false
    ingress: false
  endpointSelector: {}
  ingress:
    # Allow HBONE mTLS tunnel traffic (ztunnel pod-to-pod)
    # Port 15008 is inherently authenticated via mTLS - only ztunnel
    # instances with valid SPIFFE identities can establish connections
    - toPorts:
        - ports:
            - port: "15008"
              protocol: TCP
    # Allow kubelet health probes SNAT'd by Istio ambient iptables
    # Istio rewrites probe source IP to 169.254.7.127 which Cilium
    # doesn't recognize as the host identity
    # See: https://istio.io/latest/docs/ambient/install/platform-prerequisites/
    - fromCIDR:
        - "169.254.7.127/32"
  egress:
    # Allow outbound HBONE mTLS tunnel traffic
    - toPorts:
        - ports:
            - port: "15008"
              protocol: TCP
