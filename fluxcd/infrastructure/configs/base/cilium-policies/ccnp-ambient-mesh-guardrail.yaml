apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: ambient-mesh-guardrail
spec:
  description: >-
    HBONE guardrail: meshed workloads accept HBONE traffic (15008/TCP)
    only from pods in ambient-labelled namespaces + ztunnel explicitly.
    In ambient mode, ztunnel intercepts via iptables before Cilium BPF,
    so Cilium sees original source pod identity on HBONE, not ztunnel.
    Source restriction to ambient namespaces blocks non-ambient pods
    (flux-system, kube-system, etc.) from reaching the HBONE listener.
    Istio owns identity authorization inside the tunnel via SPIFFE/mTLS.
    Non-mesh paths (LB ingress, monitoring, DNS) handled by other CCNPs.
  enableDefaultDeny:
    egress: false
    ingress: false
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.namespace.labels.istio.io/dataplane-mode: ambient
  ingress:
    # HBONE from pods in ambient-labelled namespaces.
    # Cilium sees original source pod identity (not ztunnel) because
    # ztunnel intercepts via iptables before Cilium BPF. Restricting
    # to ambient namespaces blocks non-mesh pods from reaching 15008.
    - fromEndpoints:
        - matchLabels:
            k8s:io.cilium.k8s.namespace.labels.istio.io/dataplane-mode: ambient
      toPorts:
        - ports:
            - port: "15008"
              protocol: TCP
    # HBONE from ztunnel (king-of-red-lions — not ambient-labelled).
    # Needed for cross-node HBONE where Cilium may see ztunnel as
    # the source identity on the destination node's ingress path.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: king-of-red-lions
            app: ztunnel
      toPorts:
        - ports:
            - port: "15008"
              protocol: TCP
    # Kubelet probes + node-local infrastructure.
    # host entity = kubelet running health/readiness/startup probes.
    # remote-node = probes from other nodes in multi-node scheduling.
    # health = Cilium's own health check identity.
    - fromEntities:
        - host
        - remote-node
        - health
    # Istio ambient probe SNAT source address.
    # ztunnel rewrites kubelet probe source IP to 169.254.7.127 before
    # Cilium processes it. Cilium cannot map this rewritten IP to the
    # host entity, so fromEntities: [host] does not cover it.
    - fromCIDRSet:
        - cidr: "169.254.7.127/32"
    # API server for webhook validation/mutation callbacks.
    - fromEntities:
        - kube-apiserver
