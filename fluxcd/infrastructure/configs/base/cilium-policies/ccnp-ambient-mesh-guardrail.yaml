apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: ambient-mesh-guardrail
spec:
  description: >-
    HBONE guardrail: meshed workloads only accept traffic from ztunnel
    (15008/TCP) + infrastructure. Direct pod-to-pod bypassing the mesh
    is blocked once per-namespace default-deny is active. This forces
    all service-to-service traffic through the ambient mesh where Istio
    applies SPIFFE identity authorization via AuthorizationPolicies.
    Non-mesh paths (LB ingress, monitoring, DNS) are handled by other
    CCNPs and per-namespace CNPs.
  enableDefaultDeny:
    egress: false
    ingress: false
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.namespace.labels.istio.io/dataplane-mode: ambient
  ingress:
    # HBONE mesh traffic — restricted to ztunnel identity only.
    # ztunnel is the ambient L4 proxy; all meshed service-to-service
    # traffic enters destination pods via HBONE on port 15008.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: king-of-red-lions
            app: ztunnel
      toPorts:
        - ports:
            - port: "15008"
              protocol: TCP
    # Kubelet probes + node-local infrastructure.
    # host entity = kubelet running health/readiness/startup probes.
    # remote-node = probes from other nodes in multi-node scheduling.
    # health = Cilium's own health check identity.
    - fromEntities:
        - host
        - remote-node
        - health
    # Istio ambient probe SNAT source address.
    # ztunnel rewrites kubelet probe source IP to 169.254.7.127 before
    # Cilium processes it. Cilium cannot map this rewritten IP to the
    # host entity, so fromEntities: [host] does not cover it.
    - fromCIDRSet:
        - cidr: "169.254.7.127/32"
    # API server for webhook validation/mutation callbacks.
    - fromEntities:
        - kube-apiserver
