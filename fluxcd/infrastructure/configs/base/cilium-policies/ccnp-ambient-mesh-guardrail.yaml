apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: ambient-mesh-guardrail
spec:
  description: >-
    HBONE guardrail: meshed workloads accept HBONE traffic (15008/TCP)
    from any ambient-namespace pod + infrastructure. In ambient mode,
    ztunnel transparently intercepts traffic via iptables BEFORE Cilium
    BPF processes it, so Cilium sees the original source pod identity
    on HBONE connections, not ztunnel. The guardrail therefore allows
    port 15008 from all ambient-namespace endpoints — Istio owns the
    identity authorization via SPIFFE/mTLS inside the HBONE tunnel.
    Non-mesh paths (LB ingress, monitoring, DNS) are handled by other
    CCNPs and per-namespace CNPs.
  enableDefaultDeny:
    egress: false
    ingress: false
  endpointSelector:
    matchLabels:
      k8s:io.cilium.k8s.namespace.labels.istio.io/dataplane-mode: ambient
  ingress:
    # HBONE mesh traffic — all ambient-namespace pods.
    # Cilium sees original source pod identity (not ztunnel) because
    # ztunnel intercepts via iptables before Cilium BPF. The HBONE
    # tunnel itself provides mTLS + SPIFFE identity enforcement.
    - toPorts:
        - ports:
            - port: "15008"
              protocol: TCP
    # Kubelet probes + node-local infrastructure.
    # host entity = kubelet running health/readiness/startup probes.
    # remote-node = probes from other nodes in multi-node scheduling.
    # health = Cilium's own health check identity.
    - fromEntities:
        - host
        - remote-node
        - health
    # Istio ambient probe SNAT source address.
    # ztunnel rewrites kubelet probe source IP to 169.254.7.127 before
    # Cilium processes it. Cilium cannot map this rewritten IP to the
    # host entity, so fromEntities: [host] does not cover it.
    - fromCIDRSet:
        - cidr: "169.254.7.127/32"
    # API server for webhook validation/mutation callbacks.
    - fromEntities:
        - kube-apiserver
