apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-gatus-healthcheck
spec:
  description: >-
    Allows Gatus health checker to reach probe-labelled endpoints.
    Gatus runs in gossip-stone namespace and probes service health
    across the cluster on application serving ports.
    Port ranges match the ingress-backend contract since Gatus probes
    the same services that gateways route to.
  enableDefaultDeny:
    egress: false
    ingress: false
  endpointSelector:
    matchLabels:
      policy.prplanit.com/probe: "true"
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: gossip-stone
            app.kubernetes.io/name: gatus
      toPorts:
        - ports:
            # Standard web ports
            - port: "80"
              endPort: 443
              protocol: TCP
            # Application serving ports
            - port: "2000"
              endPort: 9999
              protocol: TCP
            # High ports for specific services
            - port: "11434"
              protocol: TCP
            - port: "13031"
              protocol: TCP
            - port: "20211"
              protocol: TCP
            - port: "21114"
              endPort: 21119
              protocol: TCP
            - port: "22300"
              protocol: TCP
            - port: "32400"
              protocol: TCP
            - port: "33080"
              protocol: TCP
            - port: "35566"
              protocol: TCP
            - port: "40118"
              protocol: TCP
            - port: "40323"
              protocol: TCP
