apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: contract-postgres
spec:
  description: >-
    Contract: postgres-client pods may reach postgres pods on port 5432.
    Two-dimensional: access-class + service-scope (taxonomy enforcement).
    Destination pods must carry access-class: postgres AND service-scope.
    Source pods must carry client-class: postgres-client AND access-scope.
    Exact scope value matching is enforced in Phase 3 per-service CNPs.
  enableDefaultDeny:
    egress: false
    ingress: false
  endpointSelector:
    matchLabels:
      policy.prplanit.com/access-class: postgres
    matchExpressions:
      - key: policy.prplanit.com/service-scope
        operator: Exists
  ingress:
    - fromEndpoints:
        - matchLabels:
            policy.prplanit.com/client-class: postgres-client
          matchExpressions:
            - key: policy.prplanit.com/access-scope
              operator: Exists
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
