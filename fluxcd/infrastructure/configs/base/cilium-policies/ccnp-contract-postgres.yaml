apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: contract-postgres
spec:
  description: >-
    Contract: postgres client pods may reach postgres server pods on port 5432.
    Two-dimensional: server uses access-class + service-scope, client uses
    client-postgres + access-scope-postgres. Per-protocol client labels avoid
    single-value collisions on multi-backend pods (e.g. postgres + redis).
    Exact scope value matching is enforced in Phase 3 per-service CNPs.
  enableDefaultDeny:
    egress: false
    ingress: false
  endpointSelector:
    matchLabels:
      policy.prplanit.com/access-class: postgres
    matchExpressions:
      - key: policy.prplanit.com/service-scope
        operator: Exists
  ingress:
    - fromEndpoints:
        - matchLabels:
            policy.prplanit.com/client-postgres: "true"
          matchExpressions:
            - key: policy.prplanit.com/access-scope-postgres
              operator: Exists
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
