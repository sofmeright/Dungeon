apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: contract-postgres
spec:
  description: >-
    Backend-class admission gate for postgres. Allows postgres-capable pods
    to reach postgres servers on 5432. This CCNP enforces class membership
    (cap + scope annotation exists), NOT instance binding. Instance-level
    authorization (client scope value == server scope value) requires
    per-service CNPs. Without those, any scoped postgres-capable client
    can reach any postgres server.
  enableDefaultDeny:
    egress: false
    ingress: false
  endpointSelector:
    matchLabels:
      policy.prplanit.com/access-class: postgres
    matchExpressions:
      - key: policy.prplanit.com/service-scope
        operator: Exists
  ingress:
    - fromEndpoints:
        - matchLabels:
            policy.prplanit.com/cap.postgres: "true"
          matchExpressions:
            - key: policy.prplanit.com/access-scope-postgres
              operator: Exists
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
