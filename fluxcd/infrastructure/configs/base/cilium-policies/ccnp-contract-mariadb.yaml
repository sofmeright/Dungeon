apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: contract-mariadb
spec:
  description: >-
    Contract: mariadb client pods may reach mariadb server pods on port 3306.
    Two-dimensional: server uses access-class + service-scope, client uses
    client-mariadb + access-scope-mariadb. Per-protocol client labels avoid
    single-value collisions on multi-backend pods.
    Exact scope value matching is enforced in Phase 3 per-service CNPs.
  enableDefaultDeny:
    egress: false
    ingress: false
  endpointSelector:
    matchLabels:
      policy.prplanit.com/access-class: mariadb
    matchExpressions:
      - key: policy.prplanit.com/service-scope
        operator: Exists
  ingress:
    - fromEndpoints:
        - matchLabels:
            policy.prplanit.com/client-mariadb: "true"
          matchExpressions:
            - key: policy.prplanit.com/access-scope-mariadb
              operator: Exists
      toPorts:
        - ports:
            - port: "3306"
              protocol: TCP
