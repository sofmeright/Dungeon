apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: contract-mariadb
spec:
  description: >-
    Backend-class admission gate for mariadb. Allows mariadb-capable pods
    to reach mariadb servers on 3306. This CCNP enforces class membership
    (cap + scope annotation exists), NOT instance binding. Instance-level
    authorization (client scope value == server scope value) requires
    per-service CNPs. Without those, any scoped mariadb-capable client
    can reach any mariadb server.
  enableDefaultDeny:
    egress: false
    ingress: false
  endpointSelector:
    matchLabels:
      policy.prplanit.com/access-class: mariadb
    matchExpressions:
      - key: policy.prplanit.com/service-scope
        operator: Exists
  ingress:
    - fromEndpoints:
        - matchLabels:
            policy.prplanit.com/cap.mariadb: "true"
          matchExpressions:
            - key: policy.prplanit.com/access-scope-mariadb
              operator: Exists
      toPorts:
        - ports:
            - port: "3306"
              protocol: TCP
