apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: contract-replication-cnpg
spec:
  description: >-
    Contract: CNPG PostgreSQL cluster self-replication. Pods within the
    same CNPG cluster need to communicate on port 5432 for streaming
    replication, pg_basebackup, and switchover coordination.
    Uses cnpg.io/cluster label presence to match all CNPG instances.
    Per-cluster scoping is enforced in Phase 3 namespace CNPs.
  enableDefaultDeny:
    egress: false
    ingress: false
  endpointSelector:
    matchExpressions:
      - key: cnpg.io/cluster
        operator: Exists
  ingress:
    - fromEndpoints:
        - matchExpressions:
            - key: cnpg.io/cluster
              operator: Exists
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
