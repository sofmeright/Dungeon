apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: loki-gateway-basic-auth
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-zeldas-letter
  target:
    name: loki-gateway-basic-auth
    creationPolicy: Owner
  data:
    - secretKey: ".htpasswd"
      remoteRef:
        key: apps/loki
        property: BASIC_AUTH_HTPASS
