apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vminsert-basic-auth
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-zeldas-letter
  target:
    name: vminsert-basic-auth
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: apps/victoria-metrics
        property: BASIC_AUTH_USER
    - secretKey: password
      remoteRef:
        key: apps/victoria-metrics
        property: BASIC_AUTH_PASS
