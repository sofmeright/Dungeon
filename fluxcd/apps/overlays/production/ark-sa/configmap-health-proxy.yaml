apiVersion: v1
kind: ConfigMap
metadata:
  name: ark-health-proxy
data:
  health-server.py: |
    #!/usr/bin/env python3
    """Lightweight HTTP health server that validates ARK RCON connectivity."""
    import os
    import subprocess
    import json
    import sys
    from http.server import ThreadingHTTPServer, BaseHTTPRequestHandler

    RCON_PORT = os.environ.get("RCON_PORT", "28020")
    RCON_PASSWORD = os.environ.get("SERVER_ADMIN_PASSWORD", "")
    RCON_PATH = os.environ.get("RCON_PATH", "/usr/local/bin/rcon-cli")
    LISTEN_PORT = 8080

    def check_rcon():
        """Run rcon-cli ListPlayers with real auth — returns True only on success."""
        try:
            result = subprocess.run(
                [
                    RCON_PATH,
                    "-a", f"127.0.0.1:{RCON_PORT}",
                    "-p", RCON_PASSWORD,
                    "ListPlayers",
                ],
                capture_output=True, timeout=10,
            )
            if result.returncode != 0:
                print(
                    f"RCON check failed rc={result.returncode} "
                    f"stderr={result.stderr.decode(errors='ignore').strip()} "
                    f"stdout={result.stdout.decode(errors='ignore').strip()}",
                    file=sys.stderr,
                )
                return False
            return True
        except Exception as e:
            print(f"RCON check failed: {e}", file=sys.stderr)
            return False

    class Handler(BaseHTTPRequestHandler):
        def log_request(self, *args, **kwargs):
            pass  # suppress request logs

        def do_GET(self):
            if self.path == "/healthz":
                healthy = check_rcon()
                status = 200 if healthy else 503
                body = json.dumps({
                    "status": "healthy" if healthy else "unhealthy",
                    "rcon_port": RCON_PORT,
                })
                self.send_response(status)
                self.send_header("Content-Type", "application/json")
                self.end_headers()
                self.wfile.write(body.encode())
            elif self.path == "/livez":
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.end_headers()
                self.wfile.write(b'{"status":"alive"}')
            else:
                self.send_response(404)
                self.end_headers()

    if __name__ == "__main__":
        server = ThreadingHTTPServer(("0.0.0.0", LISTEN_PORT), Handler)
        print(f"Health server listening on :{LISTEN_PORT}")
        server.serve_forever()
