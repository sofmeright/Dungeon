apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: convertx
spec:
  replicas: 1
  template:
    metadata:
      labels:
        policy.prplanit.com/ingress: "true"
    spec:
      containers:
        - name: convertx
          image: ghcr.io/c4illin/convertx:v0.17.0
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "2000m"
              memory: "512Mi"
          env:
            - name: HTTP_ALLOWED
              value: "true"
  volumeClaimTemplates:
    - metadata:
        name: tingle-tuner-convertx-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ceph-rbd-retain
        resources:
          requests:
            storage: 10Gi
