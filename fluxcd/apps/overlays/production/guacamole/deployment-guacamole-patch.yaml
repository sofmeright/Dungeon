apiVersion: apps/v1
kind: Deployment
metadata:
  name: guacamole
spec:
  template:
    metadata:
      labels:
        policy.prplanit.com/ingress: "true"
        policy.prplanit.com/cap.postgres: "true"
        policy.prplanit.com/access-scope-postgres: hookshot.guacamole.postgres
    spec:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
      initContainers:
        - name: generate-initdb
          image: docker.io/guacamole/guacamole@sha256:bccbe36885ddb113baf92d802875922c637d7a2ac7363e04618b01935f48b1c3
        - name: init-db
          image: docker.io/postgres:15-alpine
      containers:
        - name: guacamole
          image: docker.io/guacamole/guacamole@sha256:bccbe36885ddb113baf92d802875922c637d7a2ac7363e04618b01935f48b1c3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
