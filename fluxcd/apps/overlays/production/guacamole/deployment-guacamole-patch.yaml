apiVersion: apps/v1
kind: Deployment
metadata:
  name: guacamole
spec:
  template:
    metadata:
      labels:
        policy.prplanit.com/ingress: "true"
    spec:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
      initContainers:
        - name: generate-initdb
          image: docker.io/guacamole/guacamole@sha256:28845835c285cffe7a73a502c89db6abb5d86d81eefb2475ad24b2edbe4812f0
        - name: init-db
          image: docker.io/postgres:15-alpine
      containers:
        - name: guacamole
          image: docker.io/guacamole/guacamole@sha256:28845835c285cffe7a73a502c89db6abb5d86d81eefb2475ad24b2edbe4812f0
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
