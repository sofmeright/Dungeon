apiVersion: v1
kind: ConfigMap
metadata:
  name: pve-cluster-proxy-config
data:
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;

    events {
      worker_connections 256;
    }

    http {
      log_format main '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'upstream=$upstream_addr';
      access_log /dev/stdout main;

      upstream pve_cluster {
        ip_hash;
        server 172.22.22.3:8006 max_fails=2 fail_timeout=10s;
        server 172.22.22.4:8006 max_fails=2 fail_timeout=10s;
        server 172.22.22.5:8006 max_fails=2 fail_timeout=10s;
        server 172.22.22.6:8006 max_fails=2 fail_timeout=10s;
        server 172.22.22.7:8006 max_fails=2 fail_timeout=10s;
      }

      map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
      }

      server {
        listen 8006;

        client_max_body_size 0;
        proxy_buffering off;
        proxy_connect_timeout 5s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        send_timeout 3600s;

        location / {
          proxy_pass https://pve_cluster;
          proxy_ssl_verify off;

          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Host $host;
          proxy_set_header X-Forwarded-Port $server_port;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pve-cluster-proxy
  labels:
    app: pve-cluster-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pve-cluster-proxy
  template:
    metadata:
      labels:
        app: pve-cluster-proxy
        policy.prplanit.com/ingress: "true"
    spec:
      serviceAccountName: pve-cluster-proxy
      containers:
        - name: nginx
          image: docker.io/library/nginx:1-alpine
          ports:
            - containerPort: 8006
              name: http
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            tcpSocket:
              port: 8006
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8006
            initialDelaySeconds: 5
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: pve-cluster-proxy-config
        - name: tmp
          emptyDir:
            medium: Memory
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pve-cluster-proxy
