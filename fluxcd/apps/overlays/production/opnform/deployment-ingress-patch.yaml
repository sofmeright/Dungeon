apiVersion: apps/v1
kind: Deployment
metadata:
  name: opnform-ingress
spec:
  template:
    metadata:
      labels:
        policy.prplanit.com/ingress: "true"
        policy.prplanit.com/cap.postgres: "true"
        policy.prplanit.com/access-scope-postgres: hyrule-castle.opnform.postgres
        policy.prplanit.com/cap.redis: "true"
        policy.prplanit.com/access-scope-redis: hyrule-castle.opnform.redis
