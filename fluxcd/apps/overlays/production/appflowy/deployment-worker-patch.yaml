apiVersion: apps/v1
kind: Deployment
metadata:
  name: appflowy-worker
spec:
  replicas: 1
  template:
    metadata:
      labels:
        policy.prplanit.com/cap.s3: "true"
        policy.prplanit.com/access-scope-s3: gorons-bracelet.rgw
    spec:
      containers:
        - name: appflowy-worker
          image: docker.io/appflowyinc/appflowy_worker:0.13.4
          env:
            # Override S3 credentials to use separate secret (vault-zeldas-letter)
            - name: APPFLOWY_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: appflowy-s3-secrets
                  key: APPFLOWY_S3_ACCESS_KEY
            - name: APPFLOWY_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: appflowy-s3-secrets
                  key: APPFLOWY_S3_SECRET_KEY
            - name: AWS_CA_BUNDLE
              value: "/etc/ssl/certs/s3-ca.crt"
          volumeMounts:
            - name: s3-ca
              mountPath: /etc/ssl/certs/s3-ca.crt
              subPath: ca.crt
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: s3-ca
          configMap:
            name: platform-trust-bundle
