apiVersion: apps/v1
kind: Deployment
metadata:
  name: appflowy-cloud
spec:
  replicas: 1
  template:
    metadata:
      labels:
        policy.prplanit.com/cap.postgres: "true"
        policy.prplanit.com/access-scope-postgres: temple-of-time.appflowy.postgres
        policy.prplanit.com/cap.redis: "true"
        policy.prplanit.com/access-scope-redis: temple-of-time.appflowy.redis
        policy.prplanit.com/cap.s3: "true"
        policy.prplanit.com/access-scope-s3: gorons-bracelet.rgw
    spec:
      containers:
        - name: appflowy-cloud
          image: docker.io/appflowyinc/appflowy_cloud:0.14.0
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
