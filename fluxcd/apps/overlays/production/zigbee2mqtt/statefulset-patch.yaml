apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zigbee2mqtt
spec:
  template:
    metadata:
      labels:
        policy.prplanit.com/ingress: "true"
    spec:
      initContainers:
        - name: seed-config
          image: docker.io/busybox:1.37
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: zigbee2mqtt
          image: ghcr.io/koenkk/zigbee2mqtt:2.9.1
          # z2m has no built-in health endpoint (gh#1310). The only
          # real health signal is MQTT bridge state. Probe checks
          # mosquitto for zigbee2mqtt/bridge/state = online.
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - >-
                  timeout 5 mosquitto_sub -h mosquitto -p 1883
                  -u "$ZIGBEE2MQTT_CONFIG_MQTT_USER"
                  -P "$ZIGBEE2MQTT_CONFIG_MQTT_PASSWORD"
                  -t zigbee2mqtt/bridge/state -C 1 | grep -q online
            initialDelaySeconds: 60
            periodSeconds: 60
            failureThreshold: 3
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: ceph-rbd-retain
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
