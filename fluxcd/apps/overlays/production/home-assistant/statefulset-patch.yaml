apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: home-assistant
spec:
  replicas: 1
  template:
    metadata:
      labels:
        policy.prplanit.com/ingress: "true"
    spec:
      dnsConfig:
        options:
          - name: ndots
            value: "2"
      initContainers:
        - name: seed-config
          image: docker.io/alpine/k8s:1.35.2
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        - name: install-custom-components
          image: docker.io/alpine/k8s:1.35.2
          env:
            - name: COMP_1_NAME
              value: hacs
            # renovate: datasource=github-releases depName=hacs/integration
            - name: COMP_1_VERSION
              value: "2.0.5"
            - name: COMP_1_URL
              value: "https://github.com/hacs/integration/releases/download/2.0.5/hacs.zip"
            - name: COMP_2_NAME
              value: dreame_vacuum
            # renovate: datasource=github-releases depName=Tasshack/dreame-vacuum
            - name: COMP_2_VERSION
              value: "1.0.8"
            - name: COMP_2_URL
              value: "https://github.com/Tasshack/dreame-vacuum/releases/download/v1.0.8/dreame_vacuum.zip"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      containers:
        - name: home-assistant
          image: ghcr.io/home-assistant/home-assistant:2026.3.1
          env:
            - name: TZ
              value: America/Los_Angeles
          readinessProbe:
            httpGet:
              path: /manifest.json
              port: 8123
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
        # WebSocket protocol adapter — translates HTTP/2 downstream to
        # HTTP/1.1 upstream for Android WebView compatibility.
        # See: HTTP/2 forbids Upgrade headers (RFC 7540 §8.1.2.2),
        # Android WebView reuses HTTP/2 connections for WebSocket,
        # HA requires HTTP/1.1 WebSocket upgrades.
        - name: websocket-proxy
          image: docker.io/library/nginx:1.27-alpine
          ports:
            - containerPort: 8080
              name: http-ws
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: nginx-tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /manifest.json
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 200m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 101
      volumes:
        - name: nginx-config
          configMap:
            name: home-assistant-nginx
        - name: nginx-tmp
          emptyDir: {}
