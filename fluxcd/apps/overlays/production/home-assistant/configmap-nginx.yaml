apiVersion: v1
kind: ConfigMap
metadata:
  name: home-assistant-nginx
data:
  nginx.conf: |
    # WebSocket-aware reverse proxy for Home Assistant
    # Handles HTTP/2 → HTTP/1.1 protocol translation for WebSocket
    # upgrades that Android WebView cannot negotiate over HTTP/2.

    worker_processes 1;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;

    events {
      worker_connections 256;
    }

    http {
      access_log /dev/stdout;
      client_body_temp_path /tmp/client_body;
      proxy_temp_path /tmp/proxy;
      fastcgi_temp_path /tmp/fastcgi;
      uwsgi_temp_path /tmp/uwsgi;
      scgi_temp_path /tmp/scgi;

      map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
      }

      server {
        listen 8080;
        server_name _;

        # HA-friendly proxy behavior matching the known-good nginx config
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        location / {
          proxy_pass http://localhost:8123;
        }
      }
    }
