apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: calcom-postgres
spec:
  inheritedMetadata:
    labels:
      policy.prplanit.com/cnpg: "managed"
      policy.prplanit.com/access-class: postgres
      policy.prplanit.com/service-scope: hyrule-castle.calcom.postgres

  storage:
    storageClass: ceph-rbd
    size: 10Gi
