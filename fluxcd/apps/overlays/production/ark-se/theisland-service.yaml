apiVersion: v1
kind: Service
metadata:
  name: ark-se-tmc-theisland
  annotations:
    lbipam.cilium.io/ips: "172.22.30.231"
    lbipam.cilium.io/sharing-key: shooting-gallery
    lbipam.cilium.io/sharing-cross-namespace: "*"
    gatus.home-operations.com/endpoint: |
      group: "Game Servers (Shooting Gallery🎯)"
      url: http://ark-se-tmc-theisland.shooting-gallery.svc.cluster.local:8080/healthz
      interval: 30s
      conditions:
        - "[STATUS] == 200"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  selector:
    app: ark-se-tmc-theisland
  ports:
    - port: 7797
      targetPort: 7797
      protocol: UDP
      name: theisland-game-udp
    - port: 7797
      targetPort: 7797
      protocol: TCP
      name: theisland-game-tcp
    - port: 27057
      targetPort: 27057
      protocol: UDP
      name: theisland-query-udp
    - port: 27057
      targetPort: 27057
      protocol: TCP
      name: theisland-query-tcp
    - port: 27095
      targetPort: 27095
      protocol: TCP
      name: theisland-rcon
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: theisland-health
