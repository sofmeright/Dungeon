apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: compass
resources:
  - ../../../base/openspeedtest
  - httproute-xylem.yaml
patches:
  - path: deployment-patch.yaml
  - target:
      kind: Deployment
      name: openspeedtest
    patch: |-
      - op: replace
        path: /spec/template/spec/imagePullSecrets
        value:
          - name: jcr-pcfae-dungeon-pull-secret
  - path: configmap-patch.yaml
  - path: externalsecret-patch.yaml
  - path: service-openspeedtest-ingress-patch.yaml
    target:
      kind: Service
      name: openspeedtest
