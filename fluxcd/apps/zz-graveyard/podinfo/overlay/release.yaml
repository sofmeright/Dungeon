apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo
spec:
  chart:
    spec:
      version: ">=1.0.0"
  # postRenderers adds labels/annotations that the podinfo chart doesn't
  # natively support (it has no podLabels value). Kustomize patch runs
  # after helm template, so it can inject into the rendered Deployment.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: podinfo
            patch: |
              - op: add
                path: /spec/template/metadata/labels/policy.prplanit.com~1ingress
                value: "true"
  values:
    ingress:
      hosts:
        - host: podinfo.production
          paths:
            - path: /
              pathType: ImplementationSpecific
    # Kubernetes Service settings
    service:
      enabled: true
      type: ClusterIP
