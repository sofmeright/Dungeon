apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-projectsend-to-projectsend-db
spec:
  selector:
    matchLabels:
      app: projectsend-db
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/temple-of-time/sa/projectsend
      to:
        - operation:
            ports: ["3306"]
