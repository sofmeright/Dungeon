# StageFreight GitLab CI skeleton
# Behavior is configured in .stagefreight.yml, not here.
# This file translates GitLab CI context into StageFreight's normalized contract.

stages:
  - prepare
  - lint
  - security
  - deps
  - publish
  - docs
  - release

workflow:
  auto_cancel:
    on_new_commit: none

.stagefreight-context: &sf-context
  - export SF_CI_PROVIDER=gitlab
  - export SF_CI_EVENT="${CI_PIPELINE_SOURCE}"
  - export SF_CI_BRANCH="${CI_COMMIT_BRANCH}"
  - export SF_CI_TAG="${CI_COMMIT_TAG}"
  - export SF_CI_SHA="${CI_COMMIT_SHA}"
  - export SF_CI_DEFAULT_BRANCH="${CI_DEFAULT_BRANCH}"
  - export SF_CI_REPO_URL="${CI_PROJECT_URL}"
  - export SF_CI_WORKSPACE="$PWD"
  - export SF_CI_PIPELINE_ID="${CI_PIPELINE_ID}"

default:
  image: docker.cr.pcfae.com/prplanit/stagefreight:latest-dev
  interruptible: true
  tags:
    - production

lint:
  stage: lint
  before_script:
    - *sf-context
  script:
    - stagefreight lint
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

docs:
  stage: docs
  variables:
    GIT_DEPTH: 0
  before_script:
    - *sf-context
  script:
    - stagefreight ci run docs
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success
  allow_failure: true

reconcile:
  stage: publish
  variables:
    GIT_DEPTH: 0
  id_tokens:
    STAGEFREIGHT_OIDC:
      aud: stagefreight
  before_script:
    - *sf-context
  script:
    - stagefreight gitops reconcile
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success

release:
  stage: release
  variables:
    GIT_DEPTH: 0
  before_script:
    - *sf-context
  script:
    - stagefreight ci run release
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
      when: on_success
  allow_failure: true
