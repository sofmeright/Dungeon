# stagefreight-skeleton: universal
# provider: gitlab
# supports: audition, perform, review, publish, narrate
#
# GENERATED BY STAGEFREIGHT — DO NOT EDIT
# Regenerate: stagefreight ci render gitlab --write
#
# Universal lifecycle transport. One skeleton for all repo modes.
# StageFreight resolves modality from lifecycle.mode in .stagefreight.yml.

stages:
  - audition
  - perform
  - review
  - publish
  - narrate

workflow:
  auto_cancel:
    on_new_commit: interruptible

.stagefreight-context: &sf-context
  - export SF_CI_PROVIDER=gitlab
  - export SF_CI_EVENT="${CI_PIPELINE_SOURCE}"
  - export SF_CI_BRANCH="${CI_COMMIT_BRANCH}"
  - export SF_CI_TAG="${CI_COMMIT_TAG}"
  - export SF_CI_SHA="${CI_COMMIT_SHA}"
  - export SF_CI_DEFAULT_BRANCH="${CI_DEFAULT_BRANCH}"
  - export SF_CI_REPO_URL="${CI_PROJECT_URL}"
  - export SF_CI_WORKSPACE="$PWD"
  - export SF_CI_PIPELINE_ID="${CI_PIPELINE_ID}"

.transport: &transport
  DOCKER_HOST: "tcp://dind:2376"
  DOCKER_TLS_VERIFY: "1"
  DOCKER_CERT_PATH: "/certs/client"

default:
  image: docker.cr.pcfae.com/prplanit/stagefreight:latest-dev
  interruptible: true

audition:
  stage: audition
  variables:
    GIT_DEPTH: 0
    <<: *transport
  before_script:
    - *sf-context
  script:
    - stagefreight ci run audition
  artifacts:
    paths: [.stagefreight/]
    expire_in: 1 week
  allow_failure: true

perform:
  stage: perform
  id_tokens:
    STAGEFREIGHT_OIDC:
      aud: stagefreight
  variables:
    GIT_DEPTH: 0
    <<: *transport
  before_script:
    - *sf-context
  script:
    - stagefreight ci run perform
  artifacts:
    paths: [.stagefreight/]
    expire_in: 2 hours

review:
  stage: review
  needs: [perform]
  variables:
    <<: *transport
  before_script:
    - *sf-context
  script:
    - stagefreight ci run review
  artifacts:
    paths: [.stagefreight/security/]
    expire_in: 1 week
  allow_failure: true

publish:
  stage: publish
  needs:
    - perform
    - review
  variables:
    GIT_DEPTH: 0
  before_script:
    - *sf-context
  script:
    - stagefreight ci run publish
  allow_failure: true

narrate:
  stage: narrate
  needs:
    - perform
    - publish
  variables:
    GIT_DEPTH: 0
    BUILD_DATE: "$CI_COMMIT_TIMESTAMP"
  before_script:
    - *sf-context
  script:
    - stagefreight ci run narrate
  when: always
  allow_failure: true
