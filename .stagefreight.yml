version: 1

sources:
  primary:
    kind: git
    worktree: "."
    url: "https://gitlab.prplanit.com/SoFMeRight/dungeon"
    default_branch: "main"
  publish_origin:
    kind: primary

lifecycle:
  mode: gitops

gitops:
  backend: flux
  cluster:
    name: dungeon
    server: https://172.22.144.105:6443
    exposure:
      rules:
        - level: internet
          gateways: [phloem-gateway, cell-membrane-gateway]
        - level: intranet
          gateways: [xylem-gateway]
        - level: cluster
          service_types: [ClusterIP]
        - level: intranet
          service_types: [NodePort]
  oidc:
    audience: stagefreight

commit:
  conventional: true
  backend: forge

glossary:
  types:
    feat:
      aliases: [f, feature]
      priority: 90
      release_visible: true
    fix:
      aliases: [fx, bugfix]
      priority: 80
      release_visible: true
    refactor:
      aliases: [rf]
      priority: 50
      release_visible: true
    chore:
      aliases: [c]
      priority: 20
      release_visible: false
    docs:
      aliases: [d]
      priority: 10
      release_visible: false

policies:
  git_tags:
    stable: "^v\\d+\\.\\d+\\.\\d+$"

docs:
  enabled: true
  generators:
    badges: true
    narrator: true
  commit:
    enabled: true
    type: docs
    message: "refresh generated docs and badges"
    add:
      - "README.md"
      - "docs/Apps_&_Services-Overview.md"
      - ".stagefreight/badges"
      - ".stagefreight/manifests"
    push: true
    skip_ci: false

badges:
  items:
    - id: build
      text: build
      value: "{env:BUILD_STATUS}"
      color: auto
      output: ".stagefreight/badges/build.svg"
      link: "https://gitlab.prplanit.com/SoFMeRight/dungeon/-/pipelines"
    - id: license
      text: license
      value: "AGPL-3.0"
      color: "#310937"
      output: ".stagefreight/badges/license.svg"
      link: LICENSE
    - id: updated
      text: updated
      value: "{env:BUILD_DATE}"
      color: "#236144"
      output: ".stagefreight/badges/updated.svg"

narrator:
  - file: "README.md"
    items:
      - id: badge.build
        kind: badge_ref
        ref: build
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
      - id: badge.license
        kind: badge_ref
        ref: license
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true
      - id: badge.updated
        kind: badge_ref
        ref: updated
        placement:
          between: ["<!-- sf:badges:start -->", "<!-- sf:badges:end -->"]
          mode: replace
          inline: true

  - file: "docs/Apps_&_Services-Overview.md"
    items:
      - id: cluster-inventory
        kind: k8s-inventory
        placement:
          between: ["<!-- sf:k8s-inventory:start -->", "<!-- sf:k8s-inventory:end -->"]
          mode: replace

lint:
  level: full
  exclude:
    - "docs/assets/595775375_10215519096368048_5029737080243258222_n.jpg"
    - "docs/assets/dungeon-banner.png"
  modules:
    secrets:
      enabled: true
      exclude:
        - "fluxcd/infrastructure/services/base/vaultwarden/externalsecret.yaml"
