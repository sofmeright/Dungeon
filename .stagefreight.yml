version: 1

lifecycle:
  mode: gitops

commit:
  conventional: true
  backend: git

glossary:
  types:
    feat:
      aliases: [f, feature]
      priority: 90
      release_visible: true
    fix:
      aliases: [fx, bugfix]
      priority: 80
      release_visible: true
    refactor:
      aliases: [rf]
      priority: 50
      release_visible: true
    chore:
      aliases: [c]
      priority: 20
      release_visible: false
    docs:
      aliases: [d]
      priority: 10
      release_visible: false

policies:
  git_tags:
    stable: "^v\\d+\\.\\d+\\.\\d+$"

lint:
  level: full
  exclude:
    - "docs/assets/595775375_10215519096368048_5029737080243258222_n.jpg"
    - "docs/assets/dungeon-banner.png"
  modules:
    secrets:
      enabled: true
      exclude:
        - "fluxcd/infrastructure/services/base/vaultwarden/externalsecret.yaml"
