version: 1

lifecycle:
  mode: gitops

gitops:
  backend: flux
  cluster:
    name: dungeon
    server: https://172.22.144.105:6443
    exposure:
      rules:
        - level: internet
          gateways: [phloem-gateway, cell-membrane-gateway]
        - level: intranet
          gateways: [xylem-gateway]
        - level: cluster
          service_types: [ClusterIP]
        - level: intranet
          service_types: [NodePort]
  oidc:
    audience: stagefreight

commit:
  conventional: true
  backend: git

glossary:
  types:
    feat:
      aliases: [f, feature]
      priority: 90
      release_visible: true
    fix:
      aliases: [fx, bugfix]
      priority: 80
      release_visible: true
    refactor:
      aliases: [rf]
      priority: 50
      release_visible: true
    chore:
      aliases: [c]
      priority: 20
      release_visible: false
    docs:
      aliases: [d]
      priority: 10
      release_visible: false

policies:
  git_tags:
    stable: "^v\\d+\\.\\d+\\.\\d+$"

docs:
  enabled: false

narrator:
  - file: "docs/Apps_&_Services-Overview.md"
    items:
      - id: cluster-inventory
        kind: k8s-inventory
        placement:
          between: ["<!-- sf:k8s-inventory:start -->", "<!-- sf:k8s-inventory:end -->"]
          mode: replace

lint:
  level: full
  exclude:
    - "docs/assets/595775375_10215519096368048_5029737080243258222_n.jpg"
    - "docs/assets/dungeon-banner.png"
  modules:
    secrets:
      enabled: true
      exclude:
        - "fluxcd/infrastructure/services/base/vaultwarden/externalsecret.yaml"
